<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plataforma Servicio Social | Noticias</title>

    <!-- Reusa tus estilos -->
    <link rel="stylesheet" href="/css_admin/styles.css" />
    <link rel="stylesheet" href="/css_admin/index.css" />
</head>

<body>
<div class="app">

    <!-- HEADER PÚBLICO (como la imagen) -->
    <header class="public-header">

        <!-- Fila 1: título centrado + logos derecha -->
        <div class="public-header__row1">
            <div></div>

            <div class="public-header__title">PLATAFORMA SERVICIO SOCIAL</div>

            <div class="public-header__logos">
                <img src="/img/EscudosGEM.png" alt="Escudos GEM" class="logo-img">
            </div>
        </div>

        <!-- Fila 2: menú + botones derecha -->
        <div class="public-header__row2">
            <nav class="public-nav">
                <a class="public-nav__link public-nav__link--active" href="/public/noticias">Noticias</a>
                <a class="public-nav__link" href="/public/vacantes">Vacantes</a>
                <a class="public-nav__link" href="/public/contactos">Contactos y Preguntas</a>
            </nav>

            <div class="public-actions" style="display:flex; gap:10px; align-items:center;">
                <a class="btn btn--gold" href="/login" style="text-decoration:none;">Iniciar Sesión</a>
                <a class="btn btn--primary" href="/register" style="text-decoration:none;">Registrarse</a>
            </div>
        </div>

    </header>

    <!-- BUSCADOR -->
    <section class="toolbar">
        <div class="search">
            <span class="search__icon">🔎</span>
            <input class="search__input" id="searchTitulo" type="text" placeholder="Buscar noticia por título..." />
        </div>
        <button class="btn btn--primary" id="btnBuscar" type="button">Buscar</button>
    </section>

    <!-- CONTENIDO -->
    <section class="content-grid" id="publicLayout">

        <!-- LISTADO -->
        <main class="panel panel--left">
            <div class="panel__header">
                <h2 class="panel__title">NOTICIAS PUBLICADAS</h2>
            </div>

            <div id="newsList" style="display:flex; flex-direction:column; gap:12px;"></div>

            <div class="pagination" id="pagination" style="margin-top:14px;"></div>

            <!-- Preview tipo tu diseño -->
            <section class="panel panel--preview" id="newsPreview" style="margin-top:16px; display:none;">
                <div class="panel__header">
                    <h3 class="panel__subtitle" id="previewTitle">Título</h3>
                    <div class="panel__actions">
                        <button class="btn btn--outline btn--mini" type="button" id="btnClosePreview">Cerrar</button>
                    </div>
                </div>

                <div class="preview-container-static" style="margin-top:10px;">
                    <div class="preview-text-static">
                        <div style="display:flex; gap:12px; flex-wrap:wrap; margin: 6px 0 12px; font-size:0.85rem; color: var(--muted);">
                            <span><b>Hora:</b> <span id="previewHora"></span></span>
                            <span><b>Autor:</b> <span id="previewAutor"></span></span>
                            <span><b>Estatus:</b> <span id="previewEstatus"></span></span>
                        </div>

                        <div id="previewContenido" style="white-space:pre-wrap; line-height:1.55;"></div>
                    </div>

                    <!-- Puedes cambiar la imagen por la de tu screenshot -->
                    <div class="preview-image-static" id="previewImageWrap" style="display:flex; align-items:center; justify-content:center;">
                        <img id="previewImage" src="/img/ilustracion_servicio_social.png" alt="Ilustración" style="max-width:240px; width:100%; height:auto;">
                    </div>
                </div>
            </section>

            <footer class="panel-footer">
                ©2025 - Subdirección de Desarrollo Tecnológico
            </footer>
        </main>

    </section>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

      const API = {
        publicadas: "/noticias/publicadas",
        one: (id) => `/noticias/${id}`
      };

      const list = document.getElementById("newsList");
      const searchInput = document.getElementById("searchTitulo");
      const btnBuscar = document.getElementById("btnBuscar");

      // Preview
      const preview = document.getElementById("newsPreview");
      const previewTitle = document.getElementById("previewTitle");
      const previewHora = document.getElementById("previewHora");
      const previewAutor = document.getElementById("previewAutor");
      const previewEstatus = document.getElementById("previewEstatus");
      const previewContenido = document.getElementById("previewContenido");
      const btnClosePreview = document.getElementById("btnClosePreview");

      // Pagination
      const pagination = document.getElementById("pagination");
      const PAGE_SIZE = 3;
      let currentPage = 1;

      let cacheNoticias = [];
      let currentList = [];

      function escapeHtml(str) {
        return String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function fmtHora(offsetTimeStr){
        if (!offsetTimeStr) return "";
        const m = String(offsetTimeStr).match(/^(\d{2}:\d{2})/);
        return m ? m[1] : String(offsetTimeStr);
      }

      function resumen(contenido, max=140){
        const t = String(contenido ?? "").trim().replace(/\s+/g, " ");
        if (t.length <= max) return t;
        return t.slice(0, max).trim() + "…";
      }

      function pillEstatus(estatus) {
        const e = (estatus || "").toLowerCase();
        if (e.includes("public")) return `<span class="pill pill--ok">${escapeHtml(estatus)}</span>`;
        if (e.includes("venc")) return `<span class="pill pill--bad">${escapeHtml(estatus)}</span>`;
        if (e.includes("por")) return `<span class="pill pill--warn">${escapeHtml(estatus)}</span>`;
        return `<span class="pill">${escapeHtml(estatus || "")}</span>`;
      }

      function showPreview(n) {
        previewTitle.textContent = n.titulo ?? "";
        previewHora.textContent = fmtHora(n.fechaPublicacion) ?? "";
        previewAutor.textContent = n.nombreAutor ?? "";
        previewEstatus.innerHTML = pillEstatus(n.estatus ?? "");
        previewContenido.textContent = n.contenido ?? "";

        preview.style.display = "block";
        preview.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function hidePreview() {
        preview.style.display = "none";
        previewTitle.textContent = "";
        previewHora.textContent = "";
        previewAutor.textContent = "";
        previewEstatus.textContent = "";
        previewContenido.textContent = "";
      }

      btnClosePreview?.addEventListener("click", hidePreview);

      // ===== PAGINACIÓN =====
      function getTotalPages(list) {
        return Math.max(1, Math.ceil(list.length / PAGE_SIZE));
      }

      function getPageSlice(list, page) {
        const start = (page - 1) * PAGE_SIZE;
        return list.slice(start, start + PAGE_SIZE);
      }

      function renderPagination(totalPages) {
        let html = "";
        html += `<button class="page" type="button" data-page="prev" ${currentPage === 1 ? "disabled" : ""}>‹</button>`;
        for (let p = 1; p <= totalPages; p++) {
          html += `<button class="page ${p === currentPage ? "page--active" : ""}" type="button" data-page="${p}">${p}</button>`;
        }
        html += `<button class="page" type="button" data-page="next" ${currentPage === totalPages ? "disabled" : ""}>›</button>`;
        pagination.innerHTML = html;
      }

      function renderCards(lista){
        list.innerHTML = lista.map(n => `
          <article class="panel" style="padding:12px;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
              <div style="flex:1;">
                <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:6px; font-size:.85rem; color:var(--muted);">
                  <span><b>Hora:</b> ${escapeHtml(fmtHora(n.fechaPublicacion))}</span>
                  <span><b>Autor:</b> ${escapeHtml(n.nombreAutor ?? "")}</span>
                  ${pillEstatus(n.estatus)}
                </div>

                <h3 style="margin:0 0 6px; font-size:1rem;">${escapeHtml(n.titulo)}</h3>
                <p style="margin:0; color:var(--muted); line-height:1.45;">
                  ${escapeHtml(resumen(n.contenido))}
                </p>
              </div>

              <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
                <button class="btn btn--outline btnRead" type="button" data-id="${n.id}">Leer</button>
              </div>
            </div>
          </article>
        `).join("");
      }

      function renderPaginado(listData) {
        currentList = Array.isArray(listData) ? listData : [];
        const totalPages = getTotalPages(currentList);
        if (currentPage > totalPages) currentPage = totalPages;

        const pageItems = getPageSlice(currentList, currentPage);
        renderCards(pageItems);
        renderPagination(totalPages);
      }

      pagination?.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-page]");
        if (!btn) return;

        const totalPages = getTotalPages(currentList);
        const val = btn.dataset.page;

        if (val === "prev" && currentPage > 1) currentPage--;
        else if (val === "next" && currentPage < totalPages) currentPage++;
        else {
          const n = Number(val);
          if (!isNaN(n)) currentPage = n;
        }

        renderPaginado(currentList);
      });

      // ===== CARGA =====
      async function cargarNoticiasPublicas(){
        const res = await fetch(API.publicadas);
        if (!res.ok) {
          list.innerHTML = `<div class="panel" style="padding:12px;">No se pudieron cargar las noticias públicas.</div>`;
          return;
        }
        cacheNoticias = await res.json();
        currentPage = 1;
        buscarLocal();
        hidePreview();
      }

      function buscarLocal(){
        const q = (searchInput.value || "").toLowerCase().trim();
        if (!q) { currentPage = 1; renderPaginado(cacheNoticias); return; }

        const filtradas = cacheNoticias.filter(n =>
          String(n.titulo || "").toLowerCase().includes(q)
        );

        currentPage = 1;
        renderPaginado(filtradas);
      }

      btnBuscar?.addEventListener("click", buscarLocal);
      searchInput?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); buscarLocal(); }
      });
      searchInput?.addEventListener("input", buscarLocal);

      // Click “Leer” => preview (trae detalle por id)
      list.addEventListener("click", async (e) => {
        const btn = e.target.closest("button.btnRead[data-id]");
        if (!btn) return;

        const id = Number(btn.dataset.id);
        if (!id) return;

        const res = await fetch(API.one(id));
        if (!res.ok) return;

        const n = await res.json();
        showPreview(n);
      });

      // Init
      cargarNoticiasPublicas();
    });
</script>

</body>
</html>
