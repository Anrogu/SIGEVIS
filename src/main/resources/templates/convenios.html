<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convenios - SSyPp</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="logo-area">
        <img src="/img/escudo_colibri.png" alt="Escudo de México" class="logo-escudo">
        <img src="/img/escudo_estado_mexico.png" alt="Gobierno del Estado de México" class="logo-estado">
    </div>

    <h1 class="page-title">CONVENIOS</h1>

    <nav class="user-nav">
        <a href="index.html" class="nav-button">INICIO</a>
        <a href="#" id="logout-button" class="nav-button">CERRAR SESIÓN</a>
    </nav>
</header>

<main id="convenios-main-content" class="container-fluid content-container">
    <div class="row w-100 mx-auto">

        <div id="convenios-list-col" class="col-12">

            <section class="vacantes-controls">
                <div class="search-filters">
                    <input type="text" id="search-convenio" placeholder="Buscar por institución, carrera">

                    <select id="filter-status">
                        <option value="">Status</option>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>

                    <select id="filter-tipo">
                        <option value="">Tipo</option>
                        <option value="ss">Servicio Social</option>
                        <option value="pp">Prácticas Profesionales</option>
                    </select>
                </div>

                <button id="create-convenio-btn" class="btn btn-primary" onclick="mostrarFormularioConvenio()">Crear Convenio</button>
            </section>

            <section class="convenios-list-section data-panel">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Institución</th>
                        <th>Tipo</th>
                        <th>Carrera</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="convenios-table-body">
                    </tbody>
                </table>

                <div class="pagination-controls">
                    <a href="#" class="page-link active">1</a>
                    <a href="#" class="page-link">2</a>
                    <a href="#" class="page-link">3</a>
                    <a href="#" class="page-link">&gt;</a>
                </div>
            </section>
        </div> <div id="convenios-form-col" class="col-6 d-none">

        <section id="convenio-form-section" class="vacante-form-container form-spacing">
            <div class="form-header">
                <h2 class="form-title">Crear/Editar Convenio</h2>
            </div>

            <form id="convenio-form" class="convenio-grid-form">

                <div class="form-group-3col">
                    <div>
                        <label for="institucion">Institución:</label>
                        <input type="text" id="institucion" name="institucion" required placeholder="Nombre de la escuela/institución">
                    </div>
                    <div>
                        <label for="carreras">Carreras Cubiertas (separar por comas):</label>
                        <input type="text" id="carreras" name="carreras" required placeholder="ej. Ingeniería en Sistemas, Administración">
                    </div>
                    <div>
                        <label for="tipo_convenio">Tipo de Convenio:</label>
                        <select id="tipo_convenio" name="tipo_convenio" required>
                            <option value="">Selecciona el tipo</option>
                            <option value="ss">Servicio Social</option>
                            <option value="pp">Prácticas Profesionales</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-3col">
                    <div>
                        <label for="fecha_inicio">Fecha de Inicio:</label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio" placeholder="dd/mm/aaaa">
                    </div>
                    <div>
                        <label for="fecha_fin">Fecha de Fin:</label>
                        <input type="date" id="fecha_fin" name="fecha_fin" placeholder="dd/mm/aaaa">
                    </div>
                    <div class="form-full-width-3col">
                        <label for="observaciones">Observaciones:</label>
                        <textarea id="observaciones" name="observaciones" rows="3" placeholder="Descripción breve del convenio (alcances, condiciones, etc.)"></textarea>
                    </div>
                </div>

                <div class="form-actions form-full-width">
                    <button type="submit" class="btn btn-primary" id="guardar-convenio-btn">Guardar Convenio</button>
                    <button type="button" class="btn btn-secondary" id="cancel-convenio-form-btn" onclick="ocultarFormularioConvenio()">Cancelar</button>
                </div>
            </form>
        </section>
    </div> </div> </main>

<script src="/js/main.js"></script>
</body>
</html>
