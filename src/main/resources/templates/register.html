<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta de Usuario</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-container">

    <div class="login-left">
        <div class="overlay">
            <h2>¡BIENVENIDO!</h2>
            <p style="font-size: 0.9em; margin-top: 15px;">
                Complete el formulario para crear su cuenta y acceder a la plataforma.
            </p>
        </div>
    </div>

    <div class="login-right">

        <div class="header">
            <img src="/img/Escudo_Estado_Mexico.png" alt="Gobierno" class="logo-estado">
        </div>

        <h2>Crear Nueva Cuenta</h2>

        <form th:action="@{/gob/auth/register}" method="post">

            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required />
            </div>

            <div class="form-group">
                <label for="primerapellido">Primer Apellido:</label>
                <input type="text" id="primerapellido" name="primerapellido" required />
            </div>

            <div class="form-group">
                <label for="segundoapellido">Segundo Apellido:</label>
                <input type="text" id="segundoapellido" name="segundoapellido" />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required />
            </div>

            <input type="hidden" name="idrol" value="2" />
            <input type="hidden" name="status" value="1" />

            <div class="form-group">
                <label for="carrerasIdcarrera">Carrera:</label>
                <select id="carrerasIdcarrera" name="carrerasIdcarrera" required>
                    <option value="">Seleccione una Carrera</option>
                    <option th:each="carrera : ${carreras}"
                            th:value="${carrera.id}"
                            th:text="${carrera.nombre}"></option>
                </select>
            </div>

            <div class="form-group">
                <input type="submit" value="Registrarse" class="btn-login" />
            </div>

        </form>

        <div class="decorative-line"></div>

        <div class="login-link">
            ¿Ya tienes una cuenta? <a th:href="@{/login}">Iniciar Sesión</a>
        </div>

        <div class="text-center mt-3 footer-text">
            <p>©2025 - Subdirección de Desarrollo Tecnológico...</p>
        </div>
    </div>
</div>
</body>
</html>
