<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta de Usuario</title>
    <link rel="stylesheet" href="/css/login.css">

    <!-- Estilos para errores -->
    <style>
        .error-message {
            background-color: #fdecea;
            color: #a71d2a;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .input-error {
            border: 1px solid #dc3545 !important;
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="login-left">
        <div class="overlay">
            <h2>¡BIENVENIDO!</h2>
            <p style="font-size: 0.9em; margin-top: 15px;">
                Complete el formulario para crear su cuenta y acceder a la plataforma.
            </p>
        </div>
    </div>

    <div class="login-right">

        <div class="header">
            <img src="/img/EscudoGEM.png" alt="Gobierno" class="logo-edomex">
        </div>

        <h2>Crear Nueva Cuenta</h2>

        <!-- Mensaje de error -->
        <div id="error-message" class="error-message" style="display:none;"></div>

        <form id="registerForm">

            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required />
            </div>

            <div class="form-group">
                <label for="primerapellido">Primer Apellido:</label>
                <input type="text" id="primerapellido" name="primerapellido" required />
            </div>

            <div class="form-group">
                <label for="segundoapellido">Segundo Apellido:</label>
                <input type="text" id="segundoapellido" name="segundoapellido" />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required />
            </div>

            <input type="hidden" name="idrol" value="2" />
            <input type="hidden" name="status" value="1" />

            <div class="form-group">
                <label for="carrerasIdcarrera">Carrera:</label>
                <select id="carrerasIdcarrera" name="carrerasIdcarrera" required>
                    <option value="">Seleccione una Carrera</option>
                    <option th:each="carrera : ${carreras}"
                            th:value="${carrera.id}"
                            th:text="${carrera.nombre}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <input type="submit" value="Registrarse" class="btn-login" />
            </div>

        </form>

        <div class="decorative-line"></div>

        <div class="login-link">
            ¿Ya tienes una cuenta? <a th:href="@{/login}">Iniciar Sesión</a>
        </div>

        <div class="text-center mt-3 footer-text">
            <p>©2025 - Subdirección de Desarrollo Tecnológico...</p>
        </div>
    </div>
</div>
<script>
    const errorDiv = document.getElementById("error-message");
    const emailInput = document.getElementById("email");

    function mostrarError(mensaje) {
        errorDiv.textContent = mensaje;
        errorDiv.style.display = "block";
        emailInput.classList.add("input-error");
    }

    function ocultarError() {
        errorDiv.textContent = "";
        errorDiv.style.display = "none";
        emailInput.classList.remove("input-error");
    }

    // Limpiar error cuando el usuario escribe
    document.querySelectorAll("#registerForm input, #registerForm select")
        .forEach(el => el.addEventListener("input", ocultarError));

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        ocultarError();

        const formData = new FormData(this);

        try {
            const response = await fetch("/gob/auth/register", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                // ✅ Registro exitoso
                window.location.href = "/login?success=true";
            } else {
                // 👇 LEEMOS LA RESPUESTA TAL CUAL
                const raw = await response.text();

                // 👇 DETECTAMOS STACKTRACE / ERROR 500
                const pareceStacktrace =
                    raw.includes("java.lang.") ||
                    raw.includes("org.apache.") ||
                    raw.includes("\"trace\"") ||
                    raw.includes("Internal Server Error") ||
                    raw.length > 300;

                if (pareceStacktrace) {
                    mostrarError("Ese correo ya está registrado. Usa otro o inicia sesión.");
                } else {
                    mostrarError(raw);
                }
            }
        } catch (err) {
            mostrarError("Error de conexión con el servidor.");
        }
    });
</script>

</body>
</html>
