<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Convenio</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f3f4f6;
        }
        .card {
            border-radius: 15px;
        }
        .card-header {
            background: #0d6efd;
            color: white;
            font-size: 20px;
            padding: 15px;
            font-weight: 600;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 4px rgba(13, 110, 253, 0.5);
        }
        .btn-save {
            width: 160px;
            font-weight: bold;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input,
        .input-wrapper select {
            padding-left: 36px;
        }
    </style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <i class="fa-solid fa-file-pen me-2"></i>
            <span th:text="${convenio.idConvenio == null ? 'Nuevo Convenio' : 'Editar Convenio'}"></span>
        </div>

        <div class="card-body">

            <form th:action="@{/convenios/guardar}"
                  th:object="${convenio}"
                  method="post">

                <input type="hidden" th:field="*{idConvenio}"/>

                <!-- FOLIO -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-hashtag input-icon"></i>
                    <label class="form-label">Folio</label>
                    <input type="text" class="form-control"
                           th:field="*{folio}" required>
                </div>

                <!-- FECHA INICIO -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-calendar-day input-icon"></i>
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control"
                           th:field="*{fechaInicio}" required>
                </div>

                <!-- FECHA FIN -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-calendar-check input-icon"></i>
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control"
                           th:field="*{fechaFin}" required>
                </div>

                <!-- ESTATUS -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-flag input-icon"></i>
                    <label class="form-label">Estatus</label>
                    <select class="form-control" th:field="*{estatus}" required>
                        <option value="">Seleccione estatus</option>
                        <option value="Activo"
                                th:selected="${convenio.estatus == 'Activo'}">Activo</option>
                        <option value="Inactivo"
                                th:selected="${convenio.estatus == 'Inactivo'}">Inactivo</option>
                    </select>
                </div>

                <!-- TIPO CONVENIO -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-file-signature input-icon"></i>
                    <label class="form-label">Tipo de Convenio</label>
                    <input type="text" class="form-control"
                           th:field="*{tipoConvenio}" required>
                </div>

                <!-- ESCUELA -->
                <div class="mb-3 input-wrapper">
                    <i class="fa-solid fa-school input-icon"></i>
                    <label class="form-label">Escuela</label>

                    <select class="form-control"
                            th:field="*{escuela.idEscuela}" required>

                        <option value="">Seleccione una escuela</option>

                        <option th:each="e : ${escuelas}"
                                th:value="${e.idEscuela}"
                                th:text="${e.nombre}">
                        </option>
                    </select>

                </div>

                <div class="text-end mt-4">
                    <button class="btn btn-primary btn-save" type="submit">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Guardar
                    </button>

                    <a href="/convenios/lista" class="btn btn-secondary btn-save">
                        <i class="fa-solid fa-xmark me-2"></i>Cancelar
                    </a>
                </div>
            </form>

        </div>
    </div>

</div>

</body>
</html>
