<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Convenios</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #f3f4f6;
        }

        .table thead {
            background: #0d6efd;
            color: white;
        }

        .btn-new {
            position: fixed;
            bottom: 25px;
            right: 25px;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card-header {
            font-size: 20px;
            font-weight: 600;
        }

        .estatus-activo {
            background: #d1e7dd;
            padding: 5px 10px;
            border-radius: 20px;
            color: #0f5132;
            font-size: 13px;
        }

        .estatus-inactivo {
            background: #f8d7da;
            padding: 5px 10px;
            border-radius: 20px;
            color: #842029;
            font-size: 13px;
        }
    </style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <i class="fa-solid fa-file-contract me-2"></i> Lista de Convenios
        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(convenios)}" class="alert alert-info">
                No hay convenios registrados aún.
            </div>

            <div th:if="${!#lists.isEmpty(convenios)}" class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Folio</th>
                        <th>Estatus</th>
                        <th>Tipo</th>
                        <th>Escuela</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="c : ${convenios}">

                        <td th:text="${c.idConvenio}"></td>

                        <td th:text="${c.folio}"></td>

                        <!-- Etiquetas de estatus -->
                        <td>
                            <span th:if="${c.estatus=='Activo'}" class="estatus-activo">Activo</span>
                            <span th:if="${c.estatus=='Inactivo'}" class="estatus-inactivo">Inactivo</span>
                            <span th:if="${c.estatus!='Activo' and c.estatus!='Inactivo'}"
                                  class="badge text-bg-secondary"
                                  th:text="${c.estatus}">
                            </span>
                        </td>

                        <td th:text="${c.tipoConvenio}"></td>

                        <td th:text="${c.escuela != null ? c.escuela.nombre : 'Sin escuela'}"></td>

                        <td th:text="${c.fechaInicio}"></td>
                        <td th:text="${c.fechaFin}"></td>

                        <td>
                            <a th:href="@{'/convenios/editar/' + ${c.idConvenio}}"
                               class="btn btn-warning btn-sm">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </a>

                            <a th:href="@{'/convenios/eliminar/' + ${c.idConvenio}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este convenio?');">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

<!-- Botón flotante para crear -->
<a href="/convenios/crear" class="btn btn-primary btn-new">
    <i class="fa-solid fa-plus"></i>
</a>

</body>
</html>
