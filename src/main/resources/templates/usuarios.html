<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios y Roles</title>

    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="css/convenios.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .th-actions { width: 190px; text-align: center; }

        .actions-cell {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        /* Estilos de botones pequeños (idénticos a convenios/vacantes) */
        /* Ya vienen en convenios.css si usaste btn--mini, pero reforzamos alineación */
    </style>
</head>

<body>
<div class="app">

    <header class="topbar">
        <div class="topbar__left"><span class="topbar__title">ADMINISTRADOR</span></div>
        <div class="topbar__right">
            <div class="logos"><img th:src="@{/img/EscudosGEM.png}" alt="EscudosGEM" class="logo-img"></div>
        </div>
    </header>

    <nav class="tabs">
        <div class="tabs__left">
            <a class="tab" th:href="@{/index}">NOTICIAS</a>
            <a class="tab" th:href="@{/vacantes}">VACANTES</a>
            <a class="tab" th:href="@{/asignaciones}">ASIGNACIONES</a>
            <a class="tab" th:href="@{/actividades}">ACTIVIDADES</a>
            <a class="tab" th:href="@{/convenios}">CONVENIOS</a>
            <a class="tab" th:href="@{/catalogos}">CATÁLOGOS</a>
            <a class="tab" th:href="@{/usuarios}">USUARIOS Y ROLES</a>
            <a class="tab" th:href="@{/auditorias}">AUDITORÍA</a>
        </div>
        <div class="tabs__right">
            <button class="btn btn--outline btn--logout">CERRAR SESION</button>
        </div>
    </nav>

    <section class="toolbar">
        <div class="search">
            <span class="search__icon">🔎</span>
            <input id="searchUsuario" class="search__input" type="text" placeholder="Buscar usuario..." />
        </div>
        <button class="btn btn--primary">Buscar</button>
    </section>

    <section class="content-grid" id="usuarioLayout">

        <main class="panel panel--left">
            <div class="panel__header">
                <h2 class="panel__title">USUARIOS Y ROLES</h2>

                <div class="panel__actions">
                    <button class="btn btn--primary" type="button" id="btnNewUsuario">
                        Nuevo usuario
                    </button>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>

                    <tbody id="usuariosBody">
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="5" style="text-align:center; padding: 20px;">No hay usuarios registrados.</td>
                    </tr>

                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.nombre + ' ' + u.primerapellido + ' ' + (u.segundoapellido ?: '')}"></td>

                        <td th:text="${u.email}"></td>

                        <td th:text="${u.idrol == 1 ? 'Administrador' : (u.idrol == 2 ? 'Prestador' : 'Tutor')}"></td>

                        <td>
                            <span class="pill"
                                  th:classappend="${u.status ? 'pill--vigente' : 'pill--cancelado'}"
                                  th:text="${u.status ? 'Activo' : 'Inactivo'}">
                            </span>
                        </td>

                        <td class="actions-cell">

                            <button type="button" class="btn btn--mini btn-edit"
                                    th:data-id="${u.idusuario}"
                                    th:data-nombre="${u.nombre}"
                                    th:data-app1="${u.primerapellido}"
                                    th:data-app2="${u.segundoapellido}"
                                    th:data-email="${u.email}"
                                    th:data-rol="${u.idrol}"
                                    th:data-status="${u.status}">
                                Editar
                            </button>

                            <a th:href="@{'/usuarios/cambiar-status/' + ${u.idusuario}}"
                               class="btn btn--mini btn--outline"
                               style="text-decoration: none; color: inherit;"
                               th:text="${u.status ? 'Desactivar' : 'Activar'}">
                            </a>

                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${totalPages > 0}">
                <a th:if="${currentPage > 0}"
                   th:href="@{/usuarios(page=${currentPage - 1})}"
                   class="page">‹</a>
                <span th:unless="${currentPage > 0}"
                      class="page" style="opacity:0.5; cursor:default">‹</span>

                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/usuarios(page=${i})}"
                   th:text="${i + 1}"
                   class="page"
                   th:classappend="${currentPage == i} ? 'page--active' : ''">
                </a>

                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/usuarios(page=${currentPage + 1})}"
                   class="page">›</a>
                <span th:unless="${currentPage < totalPages - 1}"
                      class="page" style="opacity:0.5; cursor:default">›</span>
            </div>
        </main>

        <aside id="usuarioFormPanel" class="panel panel--right">
            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">GESTIÓN DE USUARIO</h3>
            </div>

            <form class="form" id="usuarioForm"
                  th:action="@{/usuarios/guardar}"
                  th:object="${usuario}"
                  method="post"
                  onsubmit="return confirm('¿Seguro que deseas guardar los cambios realizados en este usuario?');">

                <input type="hidden" th:field="*{idusuario}" id="fieldIdUsuario" />

                <div class="form-row">
                    <label>Nombre(s)</label>
                    <input type="text" th:field="*{nombre}" id="fieldNombre" required />
                </div>
                <div class="form-row form-row--2">
                    <div>
                        <label>Primer Apellido</label>
                        <input type="text" th:field="*{primerapellido}" id="fieldApp1" required />
                    </div>
                    <div>
                        <label>Segundo Apellido</label>
                        <input type="text" th:field="*{segundoapellido}" id="fieldApp2" />
                    </div>
                </div>
                <div class="form-row">
                    <label>Correo</label>
                    <input type="email" th:field="*{email}" id="fieldEmail" required />
                </div>

                <div class="form-row">
                    <label>Contraseña</label>
                    <input type="text"
                           th:field="*{password}"
                           id="fieldPassword"
                           placeholder="Solo escriba para CAMBIAR la contraseña"
                           autocomplete="off" />
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Rol</label>
                        <select th:field="*{idrol}" id="fieldRol" required>
                            <option value="">Seleccione...</option>
                            <option value="1">Administrador</option>
                            <option value="2">Prestador</option>
                            <option value="3">Tutor</option>
                        </select>
                    </div>
                    <div>
                        <label>Estado</label>
                        <select th:field="*{status}" id="fieldStatus">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions form-actions--center">
                    <button type="submit" class="btn btn--primary">Guardar</button>
                    <button type="button" class="btn btn--outline" id="btnCancelUsuario">Cancelar</button>
                </div>
            </form>
        </aside>

    </section>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const layout = document.getElementById("usuarioLayout");
        const btnNew = document.getElementById("btnNewUsuario");
        const btnCancel = document.getElementById("btnCancelUsuario");
        const form = document.getElementById("usuarioForm");

        const fId = document.getElementById("fieldIdUsuario");
        const fNombre = document.getElementById("fieldNombre");
        const fApp1 = document.getElementById("fieldApp1");
        const fApp2 = document.getElementById("fieldApp2");
        const fEmail = document.getElementById("fieldEmail");
        const fPass = document.getElementById("fieldPassword");
        const fRol = document.getElementById("fieldRol");
        const fStatus = document.getElementById("fieldStatus");

        function openForm() { layout.classList.add("is-split"); }
        function closeForm() {
            layout.classList.remove("is-split");
            setTimeout(() => { form.reset(); fId.value = ""; }, 300);
        }

        if(btnNew) btnNew.addEventListener("click", () => {
            form.reset();
            fId.value = "";
            openForm();
        });

        if(btnCancel) btnCancel.addEventListener("click", closeForm);

        // Lógica de Editar
        const tableBody = document.getElementById("usuariosBody");
        if(tableBody){
            tableBody.addEventListener("click", (e) => {
                const btn = e.target.closest(".btn-edit");
                if (btn) {
                    fId.value = btn.getAttribute("data-id");
                    fNombre.value = btn.getAttribute("data-nombre");
                    fApp1.value = btn.getAttribute("data-app1");
                    fApp2.value = btn.getAttribute("data-app2");
                    fEmail.value = btn.getAttribute("data-email");
                    fRol.value = btn.getAttribute("data-rol");

                    fPass.value = "";

                    const statusVal = btn.getAttribute("data-status");
                    fStatus.value = (statusVal === "true") ? "true" : "false";

                    openForm();
                }
            });
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const errorMsg = "[[${mensajeError}]]";
        const successMsg = "[[${mensajeExito}]]";

        if (errorMsg && errorMsg !== 'null' && errorMsg !== '') {
            alert("⚠️ ERROR:\n" + errorMsg);
        }

        if (successMsg && successMsg !== 'null' && successMsg !== '') {

        }

        const layout = document.getElementById("usuarioLayout");
        const btnNew = document.getElementById("btnNewUsuario");
    });
</script>

</body>
</html>
