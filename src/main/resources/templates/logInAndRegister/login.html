<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Servicio Social</title>

    <link rel="stylesheet" href="/css_admin/styles.css">
    <link rel="stylesheet" href="/css_public/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="login-container">

    <!-- PANEL IZQUIERDO: Ahora incluye el escudo de la UMB -->
    <div class="login-left">
        <div class="overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
            <img th:src="@{/img/EscudoColibri.png}" alt="Logo UMB" class="logo-umb-left" style="max-width: 220px; height: auto; margin-bottom: 10px;">
            <h2 style="font-size: 3rem; letter-spacing: 2px; margin: 0;">¡BIENVENIDO!</h2>
        </div>
    </div>

    <!-- PANEL DERECHO: Formulario limpio sin logos en la esquina superior derecha -->
    <div class="login-right">

        <div class="login-content-wrapper">

            <h1>Iniciar Sesión</h1>

            <form th:action="@{/login}" method="post">
                <div>
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="email" placeholder="ejemplo@edomex.gob.mx" required>
                </div>

                <div>
                    <label for="contrasena">Contraseña</label>
                    <div class="password-container">
                        <input type="password" id="contrasena" name="password" placeholder="••••••••" required>
                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <div th:if="${param.error}" class="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Credenciales inválidas. Verifica tus datos.</span>
            </div>

            <div class="footer-links">
                ¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a>
            </div>

        </div>

        <div class="copyright">
            ©2025 - Subdirección de Desarrollo Tecnológico
        </div>

    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById("contrasena");
        const icon = document.querySelector(".toggle-password i");

        if (input.type === "password") {
            input.type = "text";
            if(icon) icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            if(icon) icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

</body>
</html>
