<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacantes - SSyPp</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="logo-area">
        <img src="/img/escudo_colibri.png" alt="Escudo de México" class="logo-escudo">
        <img src="/img/escudo_estado_mexico.png" alt="Gobierno del Estado de México" class="logo-estado">
    </div>

    <h1 class="page-title">VACANTES</h1>

    <nav class="user-nav">
        <a href="index.html" class="nav-button">INICIO</a>
    </nav>
</header>
<form th:action="@{/cerrar-sesion}" method="post" style="display:inline;">
    <button type="submit" class="nav-button" style="background: none; border: none; padding: 0; cursor: pointer;">
        CERRAR SESIÓN
    </button>
</form>

<div id="main-content" class="container-fluid content-container">
    <div class="row w-100 mx-auto">

        <div id="vacantes-list-col" class="col-12">

            <section class="vacantes-controls">
                <div class="search-filters">
                    <input type="text" id="search-institucion" placeholder="Buscar por institución, carrera">

                    <select id="filter-tipo">
                        <option value="">Tipo</option>
                        <option value="ss">Servicio Social</option>
                        <option value="pp">Prácticas Profesionales</option>
                    </select>
                </div>

                <button id="create-vacante-btn" class="btn btn-primary" onclick="mostrarFormulario()">Crear Vacante</button>
            </section>

            <section class="vacantes-list-section">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>TÍTULO</th>
                        <th>ÁREA</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                    </thead>

                    <tbody id="vacantes-table-body">
                    <tr>
                        <td>1</td>
                        <td>TITULO</td>
                        <td>TI</td>
                        <td>Publicado</td>
                        <td>
                            <button class="btn-action edit-btn">Editar</button>
                            <button class="btn-action delete-btn">Eliminar</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>CONTABILIDAD</td>
                        <td>Dirección de TI</td>
                        <td>Borrador</td>
                        <td>
                            <button class="btn-action edit-btn">Editar</button>
                            <button class="btn-action delete-btn">Eliminar</button>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div class="pagination-controls">
                    <a href="#" class="page-link active">1</a>
                    <a href="#" class="page-link">2</a>
                    <a href="#" class="page-link">3</a>
                    <a href="#" class="page-link">4</a>
                    <a href="#" class="page-link">&gt;</a>
                </div>
            </section>
        </div> <div id="vacantes-form-col" class="col-6 d-none">

        <section id="vacante-form-section" class="vacante-form-container">
            <div class="form-header">
                <h2 class="form-title">Crear/Administrar Vacantes</h2>
            </div>

            <form id="vacante-form" class="vacante-grid-form">

                <div class="form-column">
                    <label for="titulo">Título vacante:</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ej. Auxiliar administrativo" required>

                    <label for="perfil">Perfil requerido:</label>
                    <input type="text" id="perfil" name="perfil" placeholder="Selecciona perfil">

                </div>

                <div class="form-column">
                    <label for="area">Área administrativa:</label>
                    <select id="area" name="area" required>
                        <option value="">Selecciona el área</option>
                        <option value="aux">Auxiliar administrativo</option>
                    </select>

                </div>

                <div class="form-full-width">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="5"></textarea>
                </div>

                <div class="form-actions form-full-width">
                    <button type="submit" class="btn btn-primary" id="publish-btn">Publicar vacante</button>

                    <button type="button" class="btn btn-secondary" id="cancel-form-btn" onclick="ocultarFormulario()">Cancelar</button>
                </div>
            </form>
        </section>
    </div> </div> </div> <script src="/js/main.js"></script>
</body>
</html>
