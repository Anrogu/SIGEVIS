<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador | Vacantes</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/index.css" /> <!-- ✅ Para el modal GOV como Noticias -->
    <link rel="stylesheet" href="css/convenios.css" />
</head>

<body>
<div class="app">

    <!-- ✅ Usuario actual (para “creado por”) -->
    <input type="hidden" id="currentUser"
           th:value="${#authentication != null ? #authentication.name : ''}" />

    <header class="topbar">
        <div class="topbar__left">
            <span class="topbar__title">ADMINISTRADOR</span>
        </div>

        <div class="topbar__right">
            <div class="logos">
                <img src="/img/EscudosGEM.png" alt="EscudosGEM" class="logo-img">
            </div>
        </div>
    </header>

    <nav class="tabs">
        <div class="tabs__left">
            <a class="tab" th:href="@{/index}">NOTICIAS</a>
            <a class="tab tab--active" th:href="@{/vacantes}">VACANTES</a>
            <a class="tab" th:href="@{/postulaciones}">POSTULACIONES</a>
            <a class="tab" th:href="@{/actividades}">ACTIVIDADES Y EVIDENCIAS</a>
            <a class="tab" th:href="@{/convenios}">CONVENIOS</a>
            <a class="tab" th:href="@{/catalogos}">CATÁLOGOS</a>
            <a class="tab" th:href="@{/usuarios}">USUARIOS Y ROLES</a>
        </div>
        <div class="tabs__right">
            <button id="btnLogout" class="btn btn--outline btn--logout">CERRAR SESION</button>
        </div>
    </nav>

    <section class="toolbar">
        <div class="search">
            <span class="search__icon">🔎</span>
            <input id="searchVac" class="search__input" type="text"
                   placeholder="Buscar por nombre de vacante o unidad..." />
        </div>
        <button class="btn btn--primary" type="button" id="btnSearchVac">Buscar</button>
    </section>

    <section class="content-grid" id="vacLayout">

        <main class="panel panel--left">
            <div class="panel__header">
                <h2 class="panel__title">VACANTES</h2>

                <div class="panel__actions">
                    <button class="btn btn--primary" type="button" id="btnNewVac">
                        Nueva vacante
                    </button>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <!-- ✅ Solo estas columnas -->
                        <th>Título</th>
                        <th>Unidad</th>
                        <th>No. Vacantes</th>
                        <th>Creado por</th>
                        <th>Estado</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>

                    <tbody id="vacantesBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>

            <!-- ✅ DETALLE (abajo, como Noticias) -->
            <div id="vacDetailsWrap" style="display:none; margin-top:14px;">
                <div class="panel" style="border:1px solid var(--border, #ddd); background:#fff;">
                    <div class="panel__header panel__header--compact" style="display:flex; align-items:center; justify-content:space-between;">
                        <h3 class="panel__subtitle" style="margin:0;">DETALLE DE VACANTE</h3>
                        <button type="button" id="btnCloseDetails" class="btn btn--outline btn--mini">Cerrar</button>
                    </div>

                    <div id="vacDetails" style="padding:14px;">
                        <!-- JS llena aquí -->
                    </div>
                </div>
            </div>

        </main>

        <aside id="vacFormPanel" class="panel panel--right">
            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">VACANTES</h3>
            </div>

            <form class="form" id="vacForm">

                <div class="form-row">
                    <label>Título de la Vacante</label>
                    <input id="nombrePuesto" type="text" placeholder="Ej. Auxiliar Administrativo..." />
                </div>

                <div class="form-row">
                    <label>Descripción</label>
                    <textarea id="descripcion" rows="3" placeholder="Describe brevemente la vacante..."></textarea>
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Unidad / Área solicitante</label>
                        <select id="AreasDgp_idArea">
                            <option value="1">Archivo</option>
                            <option value="2">Jurídico</option>
                            <option value="3">Desarrollo Tecnológico</option>
                        </select>
                    </div>

                    <div>
                        <label>Carrera / Estudiante que curse</label>
                        <select id="Carreras_idCarerra">
                            <option value="1">Ingeniero en Sistemas</option>
                            <option value="2">Administrador</option>
                            <option value="3">Contador</option>
                        </select>
                    </div>
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Modalidad</label>
                        <select id="Modalidades_idModalidad">
                            <option value="1">Presencial</option>
                            <option value="2">Remoto</option>
                            <option value="3">Híbrido</option>
                        </select>
                    </div>

                    <div>
                        <label>Horario</label>
                        <select id="Horarios_idHorario">
                            <option value="1">Matutino</option>
                            <option value="2">Vespertino</option>
                            <option value="3">Tiempo Completo</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <label>Requisitos</label>
                    <textarea id="requisitos" rows="3" placeholder="Ej. Ser alumno regular, promedio mínimo..."></textarea>
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Número de Vacantes</label>
                        <input id="numeroPlazas" class="input--small" type="number" min="1" placeholder="5" />
                    </div>

                    <div>
                        <label>Programar Publicación</label>
                        <input id="fechaPublicacion" class="input--small" type="time" step="1" />
                    </div>
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Estatus</label>
                        <select id="estatus">
                            <option value="true">Publicado</option>
                            <option value="false">No publicado</option>
                        </select>
                    </div>
                    <div></div>
                </div>

                <div class="form-actions form-actions--center">
                    <button type="submit" class="btn btn--primary">Guardar</button>
                    <button type="button" class="btn btn--wine" id="btnCancelVac">Cancelar</button>
                </div>
            </form>
        </aside>

    </section>
</div>

<!-- ======================================================
     MODAL GOV (mismo estilo que Noticias, definido en index.css)
====================================================== -->
<div id="gobModal" class="gob-modal gob-modal--danger" style="display:none;">
    <div class="gob-modal__backdrop" data-close="1"></div>

    <div class="gob-modal__card" role="dialog" aria-modal="true" aria-labelledby="gobModalTitle">
        <div class="gob-modal__header">
            <div class="gob-modal__icon">!</div>
            <div class="gob-modal__titles">
                <p id="gobModalTitle" class="gob-modal__title">Título</p>
                <p id="gobModalSubtitle" class="gob-modal__subtitle">Subtítulo</p>
            </div>
            <button class="gob-modal__x" type="button" data-close="1">×</button>
        </div>

        <div id="gobModalBody" class="gob-modal__body">
            Contenido
        </div>

        <div class="gob-modal__footer">
            <button id="gobModalCancel" type="button" class="btn">Cancelar</button>
            <button id="gobModalOk" type="button" class="btn btn--primary">Aceptar</button>
        </div>
    </div>
</div>

<script>
    const btnLogout = document.getElementById("btnLogout");

    btnLogout?.addEventListener("click", async () => {
        try {
            const res = await fetch("/logout", {
                method: "POST",
                credentials: "same-origin"
            });
            if (res.ok || res.status === 302) {
                window.location.href = "/login?logout";
            }
        } catch (err) { console.error(err); }
    });

    document.addEventListener("DOMContentLoaded", () => {
        const API = "/vacantes";

        // ================= MODAL (igual estilo Noticias) =================
        const gobModal = document.getElementById("gobModal");
        const gobModalTitle = document.getElementById("gobModalTitle");
        const gobModalSubtitle = document.getElementById("gobModalSubtitle");
        const gobModalBody = document.getElementById("gobModalBody");
        const gobModalOk = document.getElementById("gobModalOk");
        const gobModalCancel = document.getElementById("gobModalCancel");
        let modalOnOk = null;

        function openGobModal({type="info", title="Aviso", subtitle="", body="", okText="Aceptar", cancelText="Cancelar", onOk=null, hideCancel=false}) {
            gobModal.classList.remove("gob-modal--info","gob-modal--success","gob-modal--warning","gob-modal--danger");
            gobModal.classList.add(`gob-modal--${type}`);

            gobModalTitle.textContent = title;
            gobModalSubtitle.textContent = subtitle;
            gobModalBody.textContent = body;

            gobModalOk.textContent = okText;
            gobModalCancel.textContent = cancelText;

            gobModalCancel.style.display = hideCancel ? "none" : "inline-flex";

            modalOnOk = onOk;
            gobModal.style.display = "flex";
        }

        function closeGobModal() {
            gobModal.style.display = "none";
            modalOnOk = null;
        }

        gobModal.addEventListener("click", (e) => {
            const close = e.target.closest("[data-close='1']");
            if (close) closeGobModal();
        });

        gobModalCancel.addEventListener("click", closeGobModal);

        gobModalOk.addEventListener("click", async () => {
            if (typeof modalOnOk === "function") {
                await modalOnOk();
            }
            closeGobModal();
        });

        function showSuccess(message) {
            openGobModal({
                type: "success",
                title: "Listo",
                subtitle: "",
                body: message,
                okText: "OK",
                hideCancel: true
            });
        }

        function showError(message) {
            openGobModal({
                type: "danger",
                title: "Ocurrió un error",
                subtitle: "",
                body: message,
                okText: "Entendido",
                hideCancel: true
            });
        }
        // ================================================================

        // Referencias UI
        const btnNew = document.getElementById("btnNewVac");
        const btnCancel = document.getElementById("btnCancelVac");
        const layout = document.getElementById("vacLayout");
        const tbody = document.getElementById("vacantesBody");
        const form = document.getElementById("vacForm");
        const searchInput = document.getElementById("searchVac");
        const btnSearch = document.getElementById("btnSearchVac");
        const pagination = document.getElementById("pagination");

        // Detalle
        const vacDetailsWrap = document.getElementById("vacDetailsWrap");
        const vacDetails = document.getElementById("vacDetails");
        const btnCloseDetails = document.getElementById("btnCloseDetails");

        // Usuario actual
        const currentUser = (document.getElementById("currentUser")?.value || "").trim();

        // Estado
        let vacantesCache = [];
        let currentList = [];
        let editing = null;
        let selectedId = null;

        // Configuración Paginación
        const PAGE_SIZE = 9;
        let currentPage = 1;

        // --- Helpers: obtener texto visible de selects ---
        function getSelectText(selectId, value) {
            const sel = document.getElementById(selectId);
            if (!sel) return String(value ?? "");
            const opt = sel.querySelector(`option[value="${value}"]`);
            return opt ? opt.textContent.trim() : String(value ?? "");
        }
        const areaName = (id) => getSelectText("AreasDgp_idArea", id);
        const carreraName = (id) => getSelectText("Carreras_idCarerra", id);
        const modalidadName = (id) => getSelectText("Modalidades_idModalidad", id);
        const horarioName = (id) => getSelectText("Horarios_idHorario", id);

        function pillEstatus(estatus) {
            return estatus === true
                ? `<span class="pill pill--vigente">Publicado</span>`
                : `<span class="pill pill--cancelado">No publicado</span>`;
        }

        function fmtHora(hora) {
            if (!hora) return "";
            const s = String(hora);
            return s.slice(0, 8);
        }

        // --- Paginación ---
        function getTotalPages(list) {
            return Math.max(1, Math.ceil(list.length / PAGE_SIZE));
        }

        function getPageSlice(list, page) {
            const start = (page - 1) * PAGE_SIZE;
            return list.slice(start, start + PAGE_SIZE);
        }

        function renderPagination(totalPages) {
            if (!pagination) return;

            if (currentList.length === 0) {
                pagination.innerHTML = "";
                return;
            }

            let html = "";

            if (currentPage > 1) html += `<button class="page" type="button" data-page="prev">‹</button>`;
            else html += `<button class="page" type="button" disabled style="opacity:0.5; cursor:default">‹</button>`;

            for (let p = 1; p <= totalPages; p++) {
                const activeClass = p === currentPage ? "page--active" : "";
                html += `<button class="page ${activeClass}" type="button" data-page="${p}">${p}</button>`;
            }

            if (currentPage < totalPages) html += `<button class="page" type="button" data-page="next">›</button>`;
            else html += `<button class="page" type="button" disabled style="opacity:0.5; cursor:default">›</button>`;

            pagination.innerHTML = html;
        }

        function renderTablaPaginada(list) {
            currentList = list || [];
            const totalPages = getTotalPages(currentList);

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const pageItems = getPageSlice(currentList, currentPage);

            renderVacantes(pageItems);
            renderPagination(totalPages);
        }

        pagination?.addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-page]");
            if (!btn || btn.disabled) return;

            const totalPages = getTotalPages(currentList);
            const val = btn.dataset.page;

            if (val === "prev" && currentPage > 1) currentPage--;
            else if (val === "next" && currentPage < totalPages) currentPage++;
            else {
                const n = Number(val);
                if (!isNaN(n)) currentPage = n;
            }

            renderTablaPaginada(currentList);
        });

        // --- UI Formulario ---
        function openForm(){ layout.classList.add("is-split"); }
        function closeForm(){ layout.classList.remove("is-split"); editing = null; form.reset(); }

        btnNew?.addEventListener("click", () => { editing = null; form.reset(); openForm(); });
        btnCancel?.addEventListener("click", closeForm);
        // --- Detalle (abajo) ---
// ✅ "Creado por": el backend ya manda creadoPorNombre
function getCreatorName(v) {
    return (v.creadoPorNombre && v.creadoPorNombre.trim())
        ? v.creadoPorNombre
        : "—";
}

        function openDetails(v) {
            if (!v) return;

            const unidadTxt = v.areasDgp_idArea
            ? areaName(v.areasDgp_idArea)
            : "—";

            // 🔧 FIX FRONT: nombres según el JSON real del backend
            const carreraTxt   = carreraName(v.carreras_idCarrera);
            const modalidadTxt = modalidadName(v.modalidades_idModalidad);
            const horarioTxt   = horarioName(v.horarios_idHorario);
            const creadorTxt = getCreatorName(v);
            const estadoTxt = v.estatus === true ? "Publicado" : "No publicado";

            const horaPub = fmtHora(v.fechaPublicacion);

            vacDetails.innerHTML = `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div><strong>Título:</strong><br>${v.nombrePuesto ?? ""}</div>
                    <div><strong>Unidad:</strong><br>${unidadTxt}</div>

                    <div><strong>No. Vacantes:</strong><br>${v.numeroPlazas ?? ""}</div>
                    <div><strong>Estado:</strong><br>${estadoTxt}</div>

                    <div><strong>Creado por:</strong><br>${creadorTxt}</div>
                    <div><strong>Publicación:</strong><br>${horaPub || "—"}</div>

                    <div><strong>Modalidad:</strong><br>${modalidadTxt}</div>
                    <div><strong>Horario:</strong><br>${horarioTxt}</div>

                    <div style="grid-column: 1 / -1;">
                        <strong>Carrera:</strong><br>${carreraTxt}
                    </div>

                    <div style="grid-column: 1 / -1;">
                        <strong>Descripción:</strong><br>
                        <span style="white-space:pre-wrap;">${v.descripcion ?? ""}</span>
                    </div>

                    <div style="grid-column: 1 / -1;">
                        <strong>Requisitos:</strong><br>
                        <span style="white-space:pre-wrap;">${v.requisitos ?? ""}</span>
                    </div>
                </div>
            `;

            vacDetailsWrap.style.display = "block";
            // Re-render tabla para marcar seleccionado
            renderTablaPaginada(currentList);
            // Scroll suave al detalle
            vacDetailsWrap.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function closeDetails() {
            selectedId = null;
            vacDetailsWrap.style.display = "none";
            renderTablaPaginada(currentList);
        }

        btnCloseDetails?.addEventListener("click", closeDetails);

        // --- Cargar ---
        async function cargarVacantes() {
            const res = await fetch(`${API}/getAll`, { headers: { "Accept": "application/json" } });
            if (!res.ok) {
                console.error("Error getAll:", await res.text());
                showError("No se pudieron cargar las vacantes.");
                return;
            }
            vacantesCache = await res.json();
            currentPage = 1;
            renderTablaPaginada(vacantesCache);

            // Si había un seleccionado, re-abrir detalle con datos frescos
            if (selectedId != null) {
                const fresh = vacantesCache.find(x => Number(x.idVacantes) === Number(selectedId));
                if (fresh) openDetails(fresh);
            }
        }

        // --- Render tabla (SOLO columnas pedidas) ---
        function renderVacantes(lista) {
            tbody.innerHTML = "";

            if (!lista || lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px;">No se encontraron registros.</td></tr>`;
                return;
            }

            lista.forEach(v => {
                const id = Number(v.idVacantes);
                const unidadTxt = v.areasDgp_idArea
                ? areaName(v.areasDgp_idArea)
                : "—";
                const creadorTxt = getCreatorName(v);

                const tr = document.createElement("tr");
                tr.setAttribute("data-row", String(id));

                // “seleccionado” visual sin depender de CSS
                if (selectedId != null && id === Number(selectedId)) {
                    tr.style.outline = "2px solid rgba(122,15,26,.35)";
                    tr.style.background = "rgba(122,15,26,.04)";
                }

                tr.innerHTML = `
                    <td>${v.nombrePuesto ?? ""}</td>
                    <td>${unidadTxt}</td>
                    <td>${v.numeroPlazas ?? ""}</td>
                    <td>${creadorTxt}</td>
                    <td>${pillEstatus(v.estatus)}</td>
                    <td class="actions">
                        <button class="btn btn--mini" type="button" data-edit="${id}">Editar</button>
                        <button class="btn btn--mini btn--outline" type="button" data-del="${id}">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- Filtros: nombre o unidad (por texto) ---
        function filtrar() {
            const q = (searchInput?.value || "").toLowerCase().trim();

            let filtradas = vacantesCache;

            if (q) {
                filtradas = vacantesCache.filter(v => {
                    const nombre = (v.nombrePuesto ?? "").toLowerCase();
                    // 🔧 FIX FRONT: el backend manda areasDgp_idArea
                    const unidadTxt = v.areasDgp_idArea
                    ? areaName(v.areasDgp_idArea).toLowerCase()
                    : "";

                    return nombre.includes(q) || unidadTxt.includes(q);
                });
            }

            currentPage = 1;
            renderTablaPaginada(filtradas);
        }

        btnSearch?.addEventListener("click", filtrar);
        searchInput?.addEventListener("input", filtrar);

        // --- Click en tabla: Ver detalle / Editar / Eliminar ---
        tbody.addEventListener("click", async (e) => {
            const editBtn = e.target.closest("[data-edit]");
            const delBtn = e.target.closest("[data-del]");

            if (editBtn) {
                const id = Number(editBtn.getAttribute("data-edit"));
                editing = vacantesCache.find(x => Number(x.idVacantes) === id);
                if (!editing) return;

                document.getElementById("nombrePuesto").value = editing.nombrePuesto ?? "";
                document.getElementById("descripcion").value = editing.descripcion ?? "";
                document.getElementById("requisitos").value = editing.requisitos ?? "";
                document.getElementById("numeroPlazas").value = editing.numeroPlazas ?? "";
                // 🔧 FIX FRONT: IDs según el JSON real del backend
                document.getElementById("AreasDgp_idArea").value = editing.areasDgp_idArea ?? "";
                document.getElementById("Carreras_idCarerra").value = editing.carreras_idCarrera ?? "";
                document.getElementById("Modalidades_idModalidad").value = editing.modalidades_idModalidad ?? "";
                document.getElementById("Horarios_idHorario").value = editing.horarios_idHorario ?? "";
                document.getElementById("estatus").value = String(editing.estatus ?? true);

                const hhmmss = fmtHora(editing.fechaPublicacion);
                document.getElementById("fechaPublicacion").value = hhmmss || "";

                openForm();
                return;
            }

            if (delBtn) {
                const id = delBtn.getAttribute("data-del");

                openGobModal({
                    type: "danger",
                    title: "Eliminar vacante",
                    subtitle: "Esta acción no se puede deshacer",
                    body: "¿Seguro que deseas eliminar esta vacante?",
                    okText: "Eliminar",
                    cancelText: "Cancelar",
                    onOk: async () => {
                        const res = await fetch(`${API}/delete/${id}`, { method: "DELETE" });
                        if (!res.ok) {
                            console.error("Error delete:", await res.text());
                            showError("No se pudo eliminar la vacante.");
                            return;
                        }
                        // Si borraste la seleccionada, cerramos detalle
                        if (selectedId != null && Number(selectedId) === Number(id)) {
                            closeDetails();
                        }
                        await cargarVacantes();
                        showSuccess("Vacante eliminada correctamente.");
                    }
                });
                return;
            }

            // ✅ Si no fue click en botones, abrimos detalle por fila
            const row = e.target.closest("tr[data-row]");
            if (row) {
                const id = Number(row.getAttribute("data-row"));
                const v = vacantesCache.find(x => Number(x.idVacantes) === id);
                if (v) openDetails(v);
            }
        });

        // --- SUBMIT ---
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const timeVal = document.getElementById("fechaPublicacion").value;
            const hhmmss = timeVal ? (timeVal.length === 5 ? timeVal + ":00" : timeVal) : null;
            const timeWithOffset = hhmmss ? `${hhmmss}-06:00` : null;

            if (!timeWithOffset) {
                showError("Selecciona una hora.");
                return;
            }

            const payloadCommon = {
                idVacantes: editing?.idVacantes ?? null,
                nombrePuesto: document.getElementById("nombrePuesto").value.trim(),
                descripcion: document.getElementById("descripcion").value.trim(),
                requisitos: document.getElementById("requisitos").value.trim(),
                numeroPlazas: Number(document.getElementById("numeroPlazas").value || 0),
                estatus: document.getElementById("estatus").value === "true",
                AreasDgp_idArea: Number(document.getElementById("AreasDgp_idArea").value || 0),
                Carreras_idCarerra: Number(document.getElementById("Carreras_idCarerra").value || 0),
                Modalidades_idModalidad: Number(document.getElementById("Modalidades_idModalidad").value || 0),
                Horarios_idHorario: Number(document.getElementById("Horarios_idHorario").value || 0),
                fechaPublicacion: timeWithOffset,

                // ✅ Para “Creado por” (si tu backend lo acepta/guarda)
                creadoPorNombre: currentUser || null
            };

            if (!payloadCommon.nombrePuesto || payloadCommon.numeroPlazas < 1) {
                showError("Faltan datos obligatorios.");
                return;
            }

            if (editing) {
                const res = await fetch(`${API}/update/${editing.idVacantes}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payloadCommon)
                });
                if (!res.ok) {
                    console.error("Error update:", await res.text());
                    showError("Error al actualizar la vacante.");
                    return;
                }

                await cargarVacantes();
                closeForm();
                showSuccess("Vacante actualizada correctamente.");

                // ✅ Abrir detalle de la actualizada
                const fresh = vacantesCache.find(x => Number(x.idVacantes) === Number(editing.idVacantes));
                if (fresh) openDetails(fresh);

            } else {
                const fd = new FormData();
                Object.entries(payloadCommon).forEach(([k, v]) => {
                    if (v !== null && v !== undefined) fd.append(k, String(v));
                });

                const res = await fetch(`${API}/create`, { method: "POST", body: fd });
                if (!res.ok) {
                    console.error("Error create:", await res.text());
                    showError("Error al crear la vacante.");
                    return;
                }

                // ✅ refrescar lista para que se refleje en tabla
                await cargarVacantes();
                closeForm();
                showSuccess("Vacante creada correctamente.");

                // ✅ Si tu API regresa el objeto creado, puedes abrirlo directo.
                // Si no, abrimos el “más reciente” por heurística (el último del arreglo).
                // Ajusta si tu backend ordena distinto.
                const last = vacantesCache[vacantesCache.length - 1];
                if (last) openDetails(last);
            }
        });

        // Inicial
        cargarVacantes();
    });
</script>

</body>
</html>
