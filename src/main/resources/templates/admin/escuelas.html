<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador | Escuelas</title>

    <link rel="stylesheet" href="/css_admin/styles.css">
    <link rel="stylesheet" href="/css_admin/index.css">

    <style>
        .th-actions{
            width:120px;
            text-align:center;
        }

        .actions-cell{
            display:flex;
            justify-content:center;
            gap:8px;
        }

        .section-space{
            margin-top:18px;
        }
    </style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="topbar">
        <div class="topbar__left">
            <span class="topbar__title">ADMINISTRADOR</span>
        </div>

        <div class="topbar__right">
            <div class="logos">
                <img th:src="@{/img/umb (2).png}"
                     alt="Escudos"
                     class="logo-img">
            </div>
        </div>
    </header>

    <!-- TABS -->
    <nav class="tabs">

        <div class="tabs__left">
            <a class="tab" th:href="@{/admin/index}">NOTICIAS</a>
            <a class="tab" th:href="@{/admin/vacantes}">VACANTES</a>
            <a class="tab" th:href="@{/admin/postulaciones}">POSTULACIONES</a>
            <a class="tab" th:href="@{/admin/asignaciones}">ASIGNACIONES</a>
            <a class="tab" th:href="@{/admin/usuarios}">USUARIOS</a>
            <a class="tab tab--active" th:href="@{/admin/escuelas}">ESCUELAS</a>
        </div>

        <div class="tabs__right">
            <button id="btnLogout"
                    class="btn btn--outline btn--logout">
                CERRAR SESION
            </button>
        </div>
    </nav>

    <!-- ========================= -->
    <!-- PANEL ESCUELAS -->
    <!-- ========================= -->

    <section class="content-grid is-split">

        <!-- TABLA -->
        <main class="panel panel--left">

            <div class="panel__header">
                <h2 class="panel__title">
                    ESCUELAS REGISTRADAS
                </h2>
            </div>

            <!-- mensajes -->
            <div th:if="${error}" class="error-message">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${success}"
                 style="background:#e8f5e9;
                        color:#2e7d32;
                        padding:10px;
                        border-radius:6px;
                        margin-bottom:15px;
                        font-size:11px;">
                <span th:text="${success}"></span>
            </div>

            <div class="table-wrap">

                <table class="table">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Escuela</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="escuela : ${escuelas}">
                        <td th:text="${escuela.idescuela}"></td>

                        <td th:text="${escuela.nombre}"></td>

                        <td class="actions">
                            <div class="actions-cell">

                                <a th:href="@{/admin/escuelas/eliminar/{id}(id=${escuela.idescuela})}"
                                   class="btn btn--mini btn--outline"
                                   onclick="return confirm('¿Eliminar escuela?')">

                                    Eliminar

                                </a>

                            </div>
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>
        </main>

        <!-- FORM -->
        <aside class="panel panel--right"
               style="display:block;opacity:1;transform:none;pointer-events:auto;">

            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">
                    GESTIÓN DE ESCUELA
                </h3>
            </div>

            <form class="form"
                  th:action="@{/admin/escuelas/guardar}"
                  method="post"
                  th:object="${nuevaEscuela}">

                <div class="form-row">
                    <label>Nombre de Escuela</label>

                    <input type="text"
                           th:field="*{nombre}"
                           placeholder="Ingrese nombre"
                           required>
                </div>

                <div class="form-actions form-actions--center">
                    <button type="submit"
                            class="btn btn--primary">
                        Guardar Escuela
                    </button>
                </div>

            </form>

        </aside>
    </section>

    <!-- ========================= -->
    <!-- PANEL CARRERAS -->
    <!-- ========================= -->

    <section class="content-grid is-split section-space">

        <!-- TABLA -->
        <main class="panel panel--left">

            <div class="panel__header">
                <h2 class="panel__title">
                    CARRERAS REGISTRADAS
                </h2>
            </div>

            <div class="table-wrap">

                <table class="table">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Carrera</th>
                        <th>Descripción</th>
                        <th>Escuela</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="carrera : ${carreras}">

                        <td th:text="${carrera.id}"></td>

                        <td th:text="${carrera.nombre}"></td>

                        <td th:text="${carrera.descripcion}"></td>

                        <td th:text="${carrera.escuela.nombre}"></td>

                        <td class="actions">

                            <div class="actions-cell">

                                <a th:href="@{/admin/escuelas/eliminar-carrera/{id}(id=${carrera.id})}"
                                   class="btn btn--mini btn--outline"
                                   onclick="return confirm('¿Eliminar carrera?')">

                                    Eliminar

                                </a>

                            </div>

                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>
        </main>

        <!-- FORM -->
        <aside class="panel panel--right"
               style="display:block;opacity:1;transform:none;pointer-events:auto;">

            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">
                    GESTIÓN DE CARRERA
                </h3>
            </div>

            <form class="form"
                  th:action="@{/admin/escuelas/guardar-carrera}"
                  method="post"
                  th:object="${nuevaCarrera}">

                <div class="form-row">
                    <label>Nombre Carrera</label>

                    <input type="text"
                           th:field="*{nombre}"
                           placeholder="Nombre carrera"
                           required>
                </div>

                <div class="form-row">
                    <label>Descripción</label>

                    <input type="text"
                           th:field="*{descripcion}"
                           placeholder="Descripción"
                           required>
                </div>

                <div class="form-row">
                    <label>Escuela</label>

                    <select th:field="*{escuela}" required>

                        <option value="">
                            Seleccione...
                        </option>

                        <option th:each="escuela : ${escuelas}"
                                th:value="${escuela.idescuela}"
                                th:text="${escuela.nombre}">
                        </option>

                    </select>
                </div>

                <div class="form-actions form-actions--center">

                    <button type="submit"
                            class="btn btn--primary">

                        Guardar Carrera

                    </button>

                </div>

            </form>

        </aside>
    </section>

</div>

<script>
    const btnLogout = document.getElementById("btnLogout");

    btnLogout?.addEventListener("click", async () => {
        try {
            const res = await fetch("/logout", {
                method:"POST",
                credentials:"same-origin"
            });

            if(res.ok || res.status===302){
                window.location.href="/login?logout";
            }

        } catch(err){
            console.error(err);
        }
    });
</script>

</body>
</html>
