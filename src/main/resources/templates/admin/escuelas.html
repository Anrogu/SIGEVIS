<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Administrar Escuelas</title>

    <link rel="stylesheet" href="/css_admin/styles.css">

    <style>

        body{
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        .container{
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        h1{
            margin-bottom: 25px;
        }

        h2{
            margin-top: 40px;
            margin-bottom: 15px;
        }

        form{
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        input,
        select{
            flex: 1;
            padding: 10px;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        table th,
        table td{
            border: 1px solid #ddd;
            padding: 10px;
        }

        table th{
            background: #eee;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Administración de Escuelas y Carreras</h1>

    <!-- MENSAJE ERROR -->
    <div th:if="${error}"
         style="background:#f8d7da;
            color:#721c24;
            padding:10px;
            margin-bottom:15px;
            border-radius:5px;">

        <span th:text="${error}"></span>

    </div>

    <!-- MENSAJE SUCCESS -->
    <div th:if="${success}"
         style="background:#d4edda;
            color:#155724;
            padding:10px;
            margin-bottom:15px;
            border-radius:5px;">

        <span th:text="${success}"></span>

    </div>

    <!-- ========================= -->
    <!-- FORMULARIO ESCUELAS -->
    <!-- ========================= -->

    <h2>Agregar Escuela</h2>

    <form th:action="@{/admin/escuelas/guardar}"
          method="post"
          th:object="${nuevaEscuela}">

        <input type="text"
               th:field="*{nombre}"
               placeholder="Nombre de la escuela"
               required>

        <button type="submit">
            Guardar Escuela
        </button>

    </form>

    <!-- ========================= -->
    <!-- TABLA ESCUELAS -->
    <!-- ========================= -->

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Escuela</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="escuela : ${escuelas}">

            <td th:text="${escuela.idescuela}"></td>

            <td th:text="${escuela.nombre}"></td>

            <td>

                <a th:href="@{/admin/escuelas/eliminar/{id}(id=${escuela.idescuela})}"
                   onclick="return confirm('¿Eliminar escuela?')">

                    Eliminar

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <!-- ========================= -->
    <!-- FORMULARIO CARRERAS -->
    <!-- ========================= -->

    <h2>Agregar Carrera</h2>

    <form th:action="@{/admin/escuelas/guardar-carrera}"
          method="post"
          th:object="${nuevaCarrera}">

        <input type="text"
               th:field="*{nombre}"
               placeholder="Nombre de la carrera"
               required>

        <input type="text"
               th:field="*{descripcion}"
               placeholder="Descripción"
               required>

        <select th:field="*{escuela}" required>

            <option value="">
                Seleccione una escuela
            </option>

            <option th:each="escuela : ${escuelas}"
                    th:value="${escuela.idescuela}"
                    th:text="${escuela.nombre}">
            </option>

        </select>

        <button type="submit">
            Guardar Carrera
        </button>

    </form>

    <!-- ========================= -->
    <!-- TABLA CARRERAS -->
    <!-- ========================= -->

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Carrera</th>
            <th>Descripción</th>
            <th>Escuela</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="carrera : ${carreras}">

            <td th:text="${carrera.id}"></td>

            <td th:text="${carrera.nombre}"></td>

            <td th:text="${carrera.descripcion}"></td>

            <td th:text="${carrera.escuela.nombre}"></td>

            <td>

                <a th:href="@{/admin/escuelas/eliminar-carrera/{id}(id=${carrera.id})}"
                   onclick="return confirm('¿Eliminar carrera?')">

                    Eliminar

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
