<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Administrar Escuelas</title>

    <link rel="stylesheet" href="/css_admin/styles.css">

    <style>

        body{
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        .container{
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        h1{
            margin-bottom: 25px;
        }

        form{
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input{
            flex: 1;
            padding: 10px;
        }

        button{
            padding: 10px 20px;
            cursor: pointer;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        table th,
        table td{
            border: 1px solid #ddd;
            padding: 10px;
        }

        table th{
            background: #eee;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Administración de Escuelas</h1>

    <!-- FORMULARIO -->
    <form th:action="@{/admin/escuelas/guardar}"
          method="post"
          th:object="${nuevaEscuela}">

        <input type="text"
               th:field="*{nombre}"
               placeholder="Nombre de la escuela"
               required>

        <button type="submit">
            Guardar
        </button>

    </form>

    <!-- TABLA -->
    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Escuela</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="escuela : ${escuelas}">

            <td th:text="${escuela.idescuela}"></td>

            <td th:text="${escuela.nombre}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
