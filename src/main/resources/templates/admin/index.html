<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador | Noticias</title>
    <link rel="stylesheet" href="/css_admin/styles.css" />
    <link rel="stylesheet" href="/css_admin/index.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
<div class="app">

    <header class="topbar">
        <div class="topbar__left">
            <span class="topbar__title">ADMINISTRADOR</span>
        </div>

        <div class="topbar__right">
            <div class="logos">
                <img src="/img/EscudosGEM.png" alt="Escudo GEM" class="logo-img">
            </div>
        </div>
    </header>

    <nav class="tabs">
        <div class="tabs__left">
            <a class="tab tab--active" th:href="@{/admin/index}">NOTICIAS</a>
            <a class="tab" th:href="@{/admin/vacantes}">VACANTES</a>
            <a class="tab" th:href="@{/admin/postulaciones}">POSTULACIONES</a>
            <a class="tab" th:href="@{/admin/asignaciones}">ASIGNACIONES</a>
            <a class="tab" th:href="@{/admin/usuarios}">USUARIOS</a>
            <a class="tab" th:href="@{/admin/escuelas}">ESCUELAS</a>
        </div>

        <div class="tabs__right">
            <button class="btn btn--outline btn--logout" type="button" id="btnLogout">
                CERRAR SESIÓN
            </button>
        </div>
    </nav>

    <section class="toolbar">
        <div class="search">
            <span class="search__icon">🔎</span>
            <input class="search__input" id="searchTitulo" type="text" placeholder="Buscar Noticia por título..." />
        </div>
        <button class="btn btn--primary" id="btnBuscar" type="button">Buscar</button>
    </section>

    <section class="content-grid" id="newsLayout">

        <main class="panel panel--left">
            <div class="panel__header">
                <h2 class="panel__title">NOTICIAS</h2>

                <div class="panel__actions">
                    <button class="btn btn--primary" type="button" id="btnNewNews">
                        Nueva noticia
                    </button>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table" id="tableFull">
                    <thead>
                    <tr>
                        <th>Hora Publicación</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Estatus</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="newsTbody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>

            <!-- ✅ PREVIEW DINÁMICO (layout tipo ejemplo, se muestra SOLO al seleccionar noticia) -->
            <section class="panel panel--preview" id="newsPreview" style="margin-top:16px; display:none;">
                <div class="panel__header">
                    <h3 class="panel__subtitle" id="previewTitle">Título</h3>
                    <div class="panel__actions">
                        <button class="btn btn--outline btn--mini" type="button" id="btnClosePreview">Cerrar</button>
                    </div>
                </div>

                <div class="preview-container-static" style="margin-top:10px;">
                    <div class="preview-text-static">
                        <div style="display:flex; gap:12px; flex-wrap:wrap; margin: 6px 0 12px; font-size:0.85rem; color: var(--muted);">
                            <span><b>Hora:</b> <span id="previewHora"></span></span>
                            <span><b>Autor:</b> <span id="previewAutor"></span></span>
                            <span><b>Estatus:</b> <span id="previewEstatus"></span></span>
                        </div>

                        <div id="previewContenido" style="white-space:pre-wrap; line-height:1.55;"></div>
                    </div>

                    <!-- Imagen opcional (oculta si no hay) -->
                    <div class="preview-image-static" id="previewImageWrap" style="display:none;">
                        <img id="previewImage" src="" alt="Imagen noticia">
                    </div>
                </div>
            </section>

        </main>

        <aside id="newsFormPanel" class="panel panel--right">
            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">Datos de la noticia</h3>
            </div>

            <form class="form" id="newsForm">
                <div class="form-row">
                    <label>Título</label>
                    <input id="inpTitulo" type="text" placeholder="Escribe el título..." />
                </div>

                <div class="form-row">
                    <label>Contenido</label>
                    <textarea id="txtContenido" rows="6" placeholder="Redacta aquí el contenido completo..."></textarea>
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Estatus</label>
                        <select id="selEstatus">
                            <option value="Publicada">Publicada</option>
                            <option value="Por vencer">Por vencer</option>
                            <option value="Vencida">Vencida</option>
                        </select>
                    </div>

                    <div>
                        <label>Hora de publicación</label>
                        <input id="inpHora" type="time" />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn--outline" id="btnCancelNews">Cancelar</button>
                    <button type="submit" class="btn btn--primary">Guardar</button>
                </div>
            </form>
        </aside>

    </section>
</div>

<div class="gob-modal" id="appModal" aria-hidden="true" style="display:none;">
    <div class="gob-modal__backdrop" data-modal-close></div>

    <div class="gob-modal__card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="gob-modal__header">
            <div class="gob-modal__icon" id="modalIcon">
                <i class="fa-solid fa-circle-info"></i>
            </div>

            <div class="gob-modal__titles">
                <h3 class="gob-modal__title" id="modalTitle">Título</h3>
                <p class="gob-modal__subtitle" id="modalSubtitle">Subtítulo</p>
            </div>

            <button class="gob-modal__x" type="button" data-modal-close aria-label="Cerrar">×</button>
        </div>

        <div class="gob-modal__body" id="modalBody">Mensaje...</div>

        <div class="gob-modal__footer" id="modalFooter"></div>
    </div>
</div>

<script>
    const btnLogout = document.getElementById("btnLogout");

    btnLogout?.addEventListener("click", async () => {
        try {
            const res = await fetch("/logout", { method: "POST", credentials: "same-origin" });
            if (res.ok || res.status === 302) window.location.href = "/login?logout";
        } catch (err) {
            console.error(err);
        }
    });

    document.addEventListener("DOMContentLoaded", () => {

        // ===== MODAL BONITO (reemplazo de alert/confirm del navegador) =====
        const appModal = document.getElementById("appModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalSubtitle = document.getElementById("modalSubtitle");
        const modalBody = document.getElementById("modalBody");
        const modalFooter = document.getElementById("modalFooter");
        const modalIcon = document.getElementById("modalIcon");

        function setModalType(type){
            if (!appModal) return;
            appModal.classList.remove("gob-modal--info","gob-modal--success","gob-modal--warning","gob-modal--danger");
            appModal.classList.add(`gob-modal--${type}`);

            const iconHtml =
                type === "success" ? '<i class="fa-solid fa-circle-check"></i>' :
                    type === "danger"  ? '<i class="fa-solid fa-triangle-exclamation"></i>' :
                        type === "warning" ? '<i class="fa-solid fa-triangle-exclamation"></i>' :
                            '<i class="fa-solid fa-circle-info"></i>';

            if (modalIcon) modalIcon.innerHTML = iconHtml;
        }

        function openModal({ type="info", title="Aviso", subtitle="", message="", buttons=[] }){
            if (!appModal) return;

            setModalType(type);
            modalTitle.textContent = title;
            modalSubtitle.textContent = subtitle;
            modalBody.textContent = message;

            modalFooter.innerHTML = "";
            buttons.forEach(b => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = b.className || "btn btn--outline";
                btn.textContent = b.text || "Aceptar";
                btn.addEventListener("click", () => {
                    closeModal();
                    b.onClick?.();
                });
                modalFooter.appendChild(btn);
            });

            appModal.style.display = "block";
            appModal.setAttribute("aria-hidden", "false");
        }

        function closeModal(){
            if (!appModal) return;
            appModal.style.display = "none";
            appModal.setAttribute("aria-hidden", "true");
        }

        // cerrar al click fuera o X
        appModal?.addEventListener("click", (e) => {
            if (e.target.matches("[data-modal-close]")) closeModal();
        });

        function appAlert(message, type="info", title="Aviso", subtitle=""){
            openModal({
                type, title, subtitle, message,
                buttons: [{ text: "Aceptar", className: "btn btn--primary" }]
            });
        }

        function appConfirm(message, {
            type="warning",
            title="Confirmar acción",
            subtitle="",
            okText="Aceptar",
            cancelText="Cancelar",
            okClass="btn btn--primary",
            cancelClass="btn btn--outline"
        } = {}){
            return new Promise(resolve => {
                openModal({
                    type, title, subtitle, message,
                    buttons: [
                        { text: cancelText, className: cancelClass, onClick: () => resolve(false) },
                        { text: okText, className: okClass, onClick: () => resolve(true) }
                    ]
                });
            });
        }

        // ===== APP =====
        const API = {
            all: "/noticias/getAll",
            one: (id) => `/noticias/${id}`,
            create: "/noticias/create",
            update: (id) => `/noticias/update/${id}`,
            del: (id) => `/noticias/delete/${id}`,
        };

        const layout = document.getElementById("newsLayout");
        const tbody = document.getElementById("newsTbody");

        const btnNew = document.getElementById("btnNewNews");
        const btnCancel = document.getElementById("btnCancelNews");
        const form = document.getElementById("newsForm");

        const inpTitulo = document.getElementById("inpTitulo");
        const txtContenido = document.getElementById("txtContenido");
        const selEstatus = document.getElementById("selEstatus");
        const inpHora = document.getElementById("inpHora");

        const searchInput = document.getElementById("searchTitulo");
        const btnBuscar = document.getElementById("btnBuscar");

        // Preview refs
        const preview = document.getElementById("newsPreview");
        const previewTitle = document.getElementById("previewTitle");
        const previewHora = document.getElementById("previewHora");
        const previewAutor = document.getElementById("previewAutor");
        const previewEstatus = document.getElementById("previewEstatus");
        const previewContenido = document.getElementById("previewContenido");
        const btnClosePreview = document.getElementById("btnClosePreview");
        const previewImageWrap = document.getElementById("previewImageWrap");
        const previewImage = document.getElementById("previewImage");

        // Pagination refs/state
        const pagination = document.getElementById("pagination");
        const PAGE_SIZE = 4;
        let currentPage = 1;

        let editingId = null;
        let cacheNoticias = [];
        let currentList = [];

        function openForm(){ layout.classList.add("is-split"); }
        function closeForm(){ layout.classList.remove("is-split"); }
        function limpiarForm(){ editingId = null; form.reset(); }

        function escapeHtml(str) {
            return String(str ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function fmtHora(offsetTimeStr){
            if (!offsetTimeStr) return "";
            const m = String(offsetTimeStr).match(/^(\d{2}:\d{2})/);
            return m ? m[1] : String(offsetTimeStr);
        }

        function pillEstatus(estatus) {
            const e = (estatus || "").toLowerCase();
            if (e.includes("public")) return `<span class="pill pill--ok">${escapeHtml(estatus)}</span>`;
            if (e.includes("venc")) return `<span class="pill pill--bad">${escapeHtml(estatus)}</span>`;
            if (e.includes("por")) return `<span class="pill pill--warn">${escapeHtml(estatus)}</span>`;
            return `<span class="pill">${escapeHtml(estatus || "")}</span>`;
        }

        function showPreview(n) {
            if (!preview) return;

            previewTitle.textContent = n.titulo ?? "";
            previewHora.textContent = fmtHora(n.fechaPublicacion) ?? "";
            previewAutor.textContent = n.nombreAutor ?? "";
            previewEstatus.textContent = n.estatus ?? "";
            previewContenido.textContent = n.contenido ?? "";

            if (previewImageWrap && previewImage && n.imagenUrl) {
                previewImage.src = n.imagenUrl;
                previewImageWrap.style.display = "flex";
            } else if (previewImageWrap) {
                previewImageWrap.style.display = "none";
            }

            preview.style.display = "block";
            preview.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function hidePreview() {
            if (!preview) return;
            preview.style.display = "none";
            previewTitle.textContent = "";
            previewHora.textContent = "";
            previewAutor.textContent = "";
            previewEstatus.textContent = "";
            previewContenido.textContent = "";
            if (previewImageWrap) previewImageWrap.style.display = "none";
            if (previewImage) previewImage.src = "";
        }

        btnClosePreview?.addEventListener("click", hidePreview);

        function renderTabla(lista){
            tbody.innerHTML = lista.map(n => `
          <tr class="news-row" data-row-id="${n.id}" style="cursor:pointer;">
            <td>${fmtHora(n.fechaPublicacion)}</td>
            <td>${escapeHtml(n.titulo)}</td>
            <td>${escapeHtml(n.nombreAutor ?? "")}</td>
            <td>${pillEstatus(n.estatus)}</td>
            <td class="actions">
              <button class="btn btn--mini" type="button" data-action="edit" data-id="${n.id}">Editar</button>
              <button class="btn btn--mini btn--outline" type="button" data-action="delete" data-id="${n.id}">Eliminar</button>
            </td>
          </tr>
        `).join("");
        }

        // ===== PAGINACIÓN =====
        function getTotalPages(list) {
            return Math.max(1, Math.ceil(list.length / PAGE_SIZE));
        }

        function getPageSlice(list, page) {
            const start = (page - 1) * PAGE_SIZE;
            return list.slice(start, start + PAGE_SIZE);
        }

        function renderPagination(totalPages) {
            if (!pagination) return;

            let html = "";
            html += `<button class="page" type="button" data-page="prev" ${currentPage === 1 ? "disabled" : ""}>‹</button>`;
            for (let p = 1; p <= totalPages; p++) {
                html += `<button class="page ${p === currentPage ? "page--active" : ""}" type="button" data-page="${p}">${p}</button>`;
            }
            html += `<button class="page" type="button" data-page="next" ${currentPage === totalPages ? "disabled" : ""}>›</button>`;
            pagination.innerHTML = html;
        }

        function renderTablaPaginada(list) {
            currentList = Array.isArray(list) ? list : [];
            const totalPages = getTotalPages(currentList);
            if (currentPage > totalPages) currentPage = totalPages;

            const pageItems = getPageSlice(currentList, currentPage);
            renderTabla(pageItems);
            renderPagination(totalPages);
        }

        pagination?.addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-page]");
            if (!btn) return;

            const totalPages = getTotalPages(currentList);
            const val = btn.dataset.page;

            if (val === "prev" && currentPage > 1) currentPage--;
            else if (val === "next" && currentPage < totalPages) currentPage++;
            else {
                const n = Number(val);
                if (!isNaN(n)) currentPage = n;
            }

            renderTablaPaginada(currentList);
        });

        // ===== API CALLS =====
        async function cargarNoticias(){
            const res = await fetch(API.all);
            if (!res.ok) {
                appAlert("Error cargando noticias (GET /noticias/getAll).", "danger", "Error");
                return;
            }
            cacheNoticias = await res.json();
            currentPage = 1;

            // ✅ IMPORTANTE: aplica el filtro actual (si el input está vacío, muestra TODO)
            buscarLocal();

            hidePreview();
        }

        async function cargarParaEditar(id){
            const res = await fetch(API.one(id));
            if (!res.ok) {
                appAlert("No se pudo cargar la noticia.", "danger", "Error");
                return;
            }
            const n = await res.json();

            editingId = n.id;
            inpTitulo.value = n.titulo ?? "";
            txtContenido.value = n.contenido ?? "";
            selEstatus.value = n.estatus ?? "Publicada";
            inpHora.value = fmtHora(n.fechaPublicacion) || "";

            openForm();
        }

        async function eliminarNoticia(id){
            const ok = await appConfirm("¿Seguro que deseas eliminar esta noticia?", {
                type: "danger",
                title: "Eliminar noticia",
                subtitle: "Esta acción no se puede deshacer",
                okText: "Eliminar",
                cancelText: "Cancelar"
            });
            if (!ok) return;

            const res = await fetch(API.del(id), { method: "DELETE" });
            if (!res.ok) {
                appAlert("Error al eliminar la noticia.", "danger", "No se pudo eliminar");
                return;
            }
            await cargarNoticias();
            appAlert("Noticia eliminada correctamente.", "success", "Listo");
        }

        // "HH:MM" -> "HH:MM:00-06:00" para OffsetTime
        function horaAOffsetTime(hhmm, offset = "-06:00"){
            return `${hhmm}:00${offset}`;
        }

        // ✅ FIX: crear sin autoridIdusuario (autor viene del backend por sesión)
        async function crearNoticia(){
            const titulo = inpTitulo.value.trim();
            const contenido = txtContenido.value.trim();
            const estatus = selEstatus.value;
            const hhmm = inpHora.value;

            if (!titulo || !contenido || !estatus || !hhmm) {
                appAlert("Completa: Título, Contenido, Estatus y Hora.", "warning", "Campos incompletos");
                return;
            }

            if (titulo.length > 40) {
                appAlert(`El título es muy largo. Tienes ${titulo.length} caracteres, el máximo es 40.`, "warning", "Validación");
                return;
            }

            const fd = new FormData();
            fd.append("titulo", titulo);
            fd.append("contenido", contenido);
            fd.append("estatus", estatus);
            fd.append("fechaPublicacion", horaAOffsetTime(hhmm));

            try {
                const res = await fetch(API.create, { method: "POST", body: fd });

                if (!res.ok) {
                    const txt = await res.text().catch(()=> "");
                    appAlert("Error al crear.\n" + txt, "danger", "No se pudo crear");
                    return;
                }

                limpiarForm(); closeForm();
                await cargarNoticias();
                appAlert("Noticia creada correctamente.", "success", "Listo");
            } catch (err) {
                console.error(err);
                appAlert("Ocurrió un error inesperado al crear la noticia.", "danger", "Error");
            }
        }

        // ✅ FIX: actualizar sin autoridIdusuario
        async function actualizarNoticia(id){
            const titulo = inpTitulo.value.trim();
            const contenido = txtContenido.value.trim();
            const estatus = selEstatus.value;
            const hhmm = inpHora.value;

            if (!id) {
                appAlert("No hay ID para actualizar.", "danger", "Error");
                return;
            }
            if (!titulo || !contenido || !estatus || !hhmm) {
                appAlert("Completa: Título, Contenido, Estatus y Hora.", "warning", "Campos incompletos");
                return;
            }

            const payload = {
                id: id,
                titulo,
                contenido,
                estatus,
                fechaPublicacion: horaAOffsetTime(hhmm)
            };

            try {
                const res = await fetch(API.update(id), {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const txt = await res.text().catch(()=> "");
                    appAlert("Error al actualizar.\n" + txt, "danger", "No se pudo actualizar");
                    return;
                }

                limpiarForm(); closeForm();
                await cargarNoticias();
                appAlert("Noticia actualizada correctamente.", "success", "Listo");
            } catch (err) {
                console.error(err);
                appAlert("Ocurrió un error inesperado al actualizar la noticia.", "danger", "Error");
            }
        }

        function buscarLocal(){
            const q = (searchInput.value || "").toLowerCase().trim();
            if (!q) { currentPage = 1; renderTablaPaginada(cacheNoticias); return; }

            const filtradas = cacheNoticias.filter(n =>
                String(n.titulo || "").toLowerCase().includes(q)
            );

            currentPage = 1;
            renderTablaPaginada(filtradas);
        }

        // Eventos UI
        btnNew?.addEventListener("click", () => { limpiarForm(); openForm(); });
        btnCancel?.addEventListener("click", () => { limpiarForm(); closeForm(); });

        // ✅ Botón buscar
        btnBuscar?.addEventListener("click", buscarLocal);

        // ✅ Enter buscar
        searchInput?.addEventListener("keydown", (e) => {
            if (e.key === "Enter") { e.preventDefault(); buscarLocal(); }
        });

        // ✅ BÚSQUEDA EN VIVO: cada tecla (incluye borrar)
        searchInput?.addEventListener("input", () => {
            buscarLocal();
        });

        // Delegación en tabla: botones + click en fila para preview
        tbody.addEventListener("click", async (e) => {
            // Botones Editar/Eliminar
            const btn = e.target.closest("button[data-action]");
            if (btn) {
                const id = Number(btn.dataset.id);
                if (!id) return;

                if (btn.dataset.action === "edit") cargarParaEditar(id);
                if (btn.dataset.action === "delete") eliminarNoticia(id);
                return;
            }

            // Click en fila => preview
            const row = e.target.closest("tr[data-row-id]");
            if (!row) return;

            const id = Number(row.dataset.rowId);
            if (!id) return;

            const res = await fetch(API.one(id));
            if (!res.ok) { appAlert("No se pudo cargar el detalle.", "danger", "Error"); return; }
            const n = await res.json();
            showPreview(n);
        });

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            if (editingId) actualizarNoticia(editingId);
            else crearNoticia();
        });

        // Inicial
        cargarNoticias();
    });
</script>

</body>
</html>
