<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>
    <title>Usuarios y Roles</title>

    <link rel="stylesheet" href="/css_admin/styles.css" />
    <link rel="stylesheet" href="/css_admin/index.css" /> <!-- ✅ Modal GOV (mismo que Noticias/Vacantes) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .th-actions { width: 190px; text-align: center; }

        .actions-cell{
            display:flex;
            justify-content:center;
            gap:6px;
        }
    </style>
</head>

<body>
<div class="app">

    <header class="topbar">
        <div class="topbar__left"><span class="topbar__title">ADMINISTRADOR</span></div>
        <div class="topbar__right">
            <div class="logos"><img th:src="@{/img/EscudosGEM.png}" alt="EscudosGEM" class="logo-img"></div>
        </div>
    </header>

    <nav class="tabs">
        <div class="tabs__left">
            <a class="tab" th:href="@{/admin/index}">NOTICIAS</a>
            <a class="tab" th:href="@{/admin/vacantes}">VACANTES</a>
            <a class="tab" th:href="@{/admin/postulaciones}">POSTULACIONES</a>
            <a class="tab" th:href="@{/admin/asignaciones}">ASIGNACIONES</a>
            <a class="tab" th:href="@{/admin/actividades}">ACTIVIDADES Y EVIDENCIAS</a>
            <a class="tab tab--active" th:href="@{/admin/usuarios}">USUARIOS Y ROLES</a>
        </div>
        <div class="tabs__right">
            <button id="btnLogout" class="btn btn--outline btn--logout">CERRAR SESION</button>
        </div>
    </nav>

    <section class="toolbar">
        <div class="search">
            <span class="search__icon">🔎</span>
            <input id="searchUsuario" class="search__input" type="text" placeholder="Buscar usuario..." />
        </div>
        <button class="btn btn--primary" type="button" id="btnSearchUsuario">Buscar</button>
    </section>

    <section class="content-grid" id="usuarioLayout">

        <main class="panel panel--left">
            <div class="panel__header">
                <h2 class="panel__title">USUARIOS Y ROLES</h2>

                <!--
                <div class="panel__actions">
                    <button class="btn btn--primary" type="button" id="btnNewUsuario">
                        Nuevo usuario
                    </button>
                </div>
                -->
            </div>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="th-actions">Acciones</th>
                    </tr>
                    </thead>

                    <tbody id="usuariosBody">
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="5" style="text-align:center; padding: 20px;">No hay usuarios registrados.</td>
                    </tr>

                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.nombre + ' ' + u.primerapellido + ' ' + (u.segundoapellido ?: '')}"></td>

                        <td th:text="${u.email}"></td>

                        <td th:text="${u.idrol == 1 ? 'Administrador' : (u.idrol == 2 ? 'Prestador' : 'Tutor')}"></td>

                        <td>
                            <span class="pill"
                                  th:classappend="${u.status ? 'pill--vigente' : 'pill--cancelado'}"
                                  th:text="${u.status ? 'Activo' : 'Inactivo'}">
                            </span>
                        </td>

                        <td class="actions">
                            <div class="actions-cell">
                                <button type="button" class="btn btn--mini btn-edit"
                                        th:data-id="${u.idusuario}"
                                        th:data-nombre="${u.nombre}"
                                        th:data-app1="${u.primerapellido}"
                                        th:data-app2="${u.segundoapellido}"
                                        th:data-email="${u.email}"
                                        th:data-rol="${u.idrol}"
                                        th:data-status="${u.status}">
                                    Editar
                                </button>

                                <!-- ✅ Activar/Desactivar con Modal GOV -->
                                <button type="button"
                                        class="btn btn--mini btn--outline btn-toggle"
                                        th:data-id="${u.idusuario}"
                                        th:data-status="${u.status}"
                                        th:data-nombre="${u.nombre + ' ' + u.primerapellido}">
                                    <span th:text="${u.status ? 'Desactivar' : 'Activar'}"></span>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${totalPages > 0}">
                <a th:if="${currentPage > 0}"
                   th:href="@{/admin/usuarios(page=${currentPage - 1})}"
                   class="page">‹</a>

                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/admin/usuarios(page=${i})}"
                   th:text="${i + 1}"
                   class="page"
                   th:classappend="${currentPage == i} ? 'page--active' : ''">
                </a>

                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/admin/usuarios(page=${currentPage + 1})}"
                   class="page">›</a>
            </div>
        </main>

        <aside id="usuarioFormPanel" class="panel panel--right">
            <div class="panel__header panel__header--compact">
                <h3 class="panel__subtitle">GESTIÓN DE USUARIO</h3>
            </div>

            <form class="form" id="usuarioForm"
                  th:action="@{/admin/usuarios/guardar}"
                  th:object="${usuario}"
                  method="post">

            <input type="hidden" th:field="*{idusuario}" id="fieldIdUsuario" />

                <div class="form-row">
                    <label>Nombre(s)</label>
                    <input type="text" th:field="*{nombre}" id="fieldNombre" required />
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Primer Apellido</label>
                        <input type="text" th:field="*{primerapellido}" id="fieldApp1" required />
                    </div>
                    <div>
                        <label>Segundo Apellido</label>
                        <input type="text" th:field="*{segundoapellido}" id="fieldApp2" />
                    </div>
                </div>

                <div class="form-row">
                    <label>Correo</label>
                    <input type="email" th:field="*{email}" id="fieldEmail" required />
                </div>

                <div class="form-row">
                    <label>Contraseña</label>
                    <input type="text"
                           th:field="*{password}"
                           id="fieldPassword"
                           placeholder="Solo escriba para CAMBIAR la contraseña"
                           autocomplete="off" />
                </div>

                <div class="form-row form-row--2">
                    <div>
                        <label>Rol</label>
                        <select th:field="*{idrol}" id="fieldRol" required>
                            <option value="">Seleccione...</option>
                            <option value="2">Prestador</option>
                            <option value="3">Tutor</option>
                        </select>
                    </div>
                    <div>
                        <label>Estado</label>
                        <select th:field="*{status}" id="fieldStatus">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions form-actions--center">
                    <button type="submit" class="btn btn--primary">Guardar</button>
                    <button type="button" class="btn btn--outline" id="btnCancelUsuario">Cancelar</button>
                </div>
            </form>
        </aside>

    </section>
</div>

<!-- ======================================================
     MODAL GOV (mismo estilo que Noticias/Vacantes, definido en index.css)
====================================================== -->
<div id="gobModal" class="gob-modal gob-modal--danger" style="display:none;">
    <div class="gob-modal__backdrop" data-close="1"></div>

    <div class="gob-modal__card" role="dialog" aria-modal="true" aria-labelledby="gobModalTitle">
        <div class="gob-modal__header">
            <div class="gob-modal__icon">!</div>
            <div class="gob-modal__titles">
                <p id="gobModalTitle" class="gob-modal__title">Título</p>
                <p id="gobModalSubtitle" class="gob-modal__subtitle">Subtítulo</p>
            </div>
            <button class="gob-modal__x" type="button" data-close="1">×</button>
        </div>

        <div id="gobModalBody" class="gob-modal__body">
            Contenido
        </div>

        <div class="gob-modal__footer">
            <button id="gobModalCancel" type="button" class="btn">Cancelar</button>
            <button id="gobModalOk" type="button" class="btn btn--primary">Aceptar</button>
        </div>
    </div>
</div>

<script>
    // ================= Logout =================
    const btnLogout = document.getElementById("btnLogout");
    btnLogout?.addEventListener("click", async () => {
        try {
            const res = await fetch("/logout", { method: "POST", credentials: "same-origin" });
            if (res.ok || res.status === 302) window.location.href = "/login?logout";
        } catch (err) { console.error(err); }
    });

    document.addEventListener("DOMContentLoaded", () => {

        // ================= MODAL GOV (igual estilo Noticias/Vacantes) =================
        const gobModal = document.getElementById("gobModal");
        const gobModalTitle = document.getElementById("gobModalTitle");
        const gobModalSubtitle = document.getElementById("gobModalSubtitle");
        const gobModalBody = document.getElementById("gobModalBody");
        const gobModalOk = document.getElementById("gobModalOk");
        const gobModalCancel = document.getElementById("gobModalCancel");
        let modalOnOk = null;

        function openGobModal({type="info", title="Aviso", subtitle="", body="", okText="Aceptar", cancelText="Cancelar", onOk=null, hideCancel=false}) {
            if (!gobModal) return;

            gobModal.classList.remove("gob-modal--info","gob-modal--success","gob-modal--warning","gob-modal--danger");
            gobModal.classList.add(`gob-modal--${type}`);

            gobModalTitle.textContent = title;
            gobModalSubtitle.textContent = subtitle;
            gobModalBody.textContent = body;

            gobModalOk.textContent = okText;
            gobModalCancel.textContent = cancelText;

            gobModalCancel.style.display = hideCancel ? "none" : "inline-flex";

            modalOnOk = onOk;
            gobModal.style.display = "flex";
        }

        function closeGobModal() {
            if (!gobModal) return;
            gobModal.style.display = "none";
            modalOnOk = null;
        }

        gobModal?.addEventListener("click", (e) => {
            const close = e.target.closest("[data-close='1']");
            if (close) closeGobModal();
        });

        gobModalCancel?.addEventListener("click", closeGobModal);

        gobModalOk?.addEventListener("click", async () => {
            if (typeof modalOnOk === "function") await modalOnOk();
            closeGobModal();
        });

        function showSuccess(message) {
            openGobModal({
                type: "success",
                title: "Listo",
                subtitle: "",
                body: message,
                okText: "OK",
                hideCancel: true
            });
        }

        function showError(message) {
            openGobModal({
                type: "danger",
                title: "Ocurrió un error",
                subtitle: "",
                body: message,
                okText: "Entendido",
                hideCancel: true
            });
        }
        // ============================================================================

        // ============== Split layout (form) ==============
        const layout = document.getElementById("usuarioLayout");
        const btnNew = document.getElementById("btnNewUsuario");
        const btnCancel = document.getElementById("btnCancelUsuario");
        const form = document.getElementById("usuarioForm");

        const fId = document.getElementById("fieldIdUsuario");
        const fNombre = document.getElementById("fieldNombre");
        const fApp1 = document.getElementById("fieldApp1");
        const fApp2 = document.getElementById("fieldApp2");
        const fEmail = document.getElementById("fieldEmail");
        const fPass = document.getElementById("fieldPassword");
        const fRol = document.getElementById("fieldRol");
        const fStatus = document.getElementById("fieldStatus");

        const optAdmin = document.getElementById("optAdmin");

        function setMode(isEdit) {
            if (optAdmin) {
                optAdmin.hidden = !isEdit;
                optAdmin.disabled = !isEdit;
                if (!isEdit && fRol.value === "1") fRol.value = "";
            }
        }

        function openForm() { layout?.classList.add("is-split"); }

        function closeForm() {
            layout?.classList.remove("is-split");
            setTimeout(() => {
                form?.reset();
                if (fId) fId.value = "";
                setMode(false);
            }, 300);
        }

        btnNew?.addEventListener("click", () => {
            form?.reset();
            if (fId) fId.value = "";
            setMode(false); // Nuevo -> ocultar Admin
            openForm();
        });

        btnCancel?.addEventListener("click", closeForm);

        // ============== Buscar (front) ==============
        const searchInput = document.getElementById("searchUsuario");
        const btnSearch = document.getElementById("btnSearchUsuario");
        const tbody = document.getElementById("usuariosBody");

        function norm(s){ return String(s ?? "").toLowerCase().trim(); }

        function filtrarTabla() {
            const q = norm(searchInput?.value);
            if (!tbody) return;

            const rows = Array.from(tbody.querySelectorAll("tr"));
            rows.forEach(tr => {
                if (tr.querySelector("td[colspan]")) return; // fila "no hay usuarios"
                const nombre = norm(tr.children[0]?.textContent);
                const correo = norm(tr.children[1]?.textContent);
                const rol = norm(tr.children[2]?.textContent);
                const match = !q || nombre.includes(q) || correo.includes(q) || rol.includes(q);
                tr.style.display = match ? "" : "none";
            });
        }

        btnSearch?.addEventListener("click", filtrarTabla);
        searchInput?.addEventListener("input", filtrarTabla);

        // ============== Editar / Activar-Desactivar ==============
        tbody?.addEventListener("click", (e) => {
            const btnEdit = e.target.closest(".btn-edit");
            const btnToggle = e.target.closest(".btn-toggle");

            if (btnEdit) {
                if (fId) fId.value = btnEdit.getAttribute("data-id") || "";
                if (fNombre) fNombre.value = btnEdit.getAttribute("data-nombre") || "";
                if (fApp1) fApp1.value = btnEdit.getAttribute("data-app1") || "";
                if (fApp2) fApp2.value = btnEdit.getAttribute("data-app2") || "";
                if (fEmail) fEmail.value = btnEdit.getAttribute("data-email") || "";
                if (fRol) fRol.value = btnEdit.getAttribute("data-rol") || "";

                if (fPass) fPass.value = "";

                const statusVal = btnEdit.getAttribute("data-status");
                if (fStatus) fStatus.value = (statusVal === "true") ? "true" : "false";

                setMode(true); // Editar -> permitir Admin
                openForm();
                return;
            }

            if (btnToggle) {
                const id = btnToggle.getAttribute("data-id");
                const statusVal = btnToggle.getAttribute("data-status"); // "true" o "false"
                const nombre = btnToggle.getAttribute("data-nombre") || "este usuario";
                const isActivo = (statusVal === "true");

                const accionTxt = isActivo ? "desactivar" : "activar";
                const titulo = isActivo ? "Desactivar usuario" : "Activar usuario";
                const tipo = isActivo ? "warning" : "success";

                openGobModal({
                    type: tipo,
                    title: titulo,
                    subtitle: "Confirma la acción",
                    body: `¿Seguro que deseas ${accionTxt} a ${nombre}?`,
                    okText: isActivo ? "Desactivar" : "Activar",
                    cancelText: "Cancelar",
                    onOk: async () => {
                        try {
                            // Mantengo tu endpoint original (MVC)
                            const res = await fetch(`/admin/usuarios/cambiar-status/${id}`, {
                            method: "GET",
                            credentials: "same-origin"
                            });


                            if (res.ok || res.redirected) {
                                showSuccess(`Usuario ${isActivo ? "desactivado" : "activado"} correctamente.`);
                                setTimeout(() => window.location.reload(), 450);
                            } else {
                                const t = await res.text();
                                console.error("Error cambiar-status:", t);
                                showError("No se pudo cambiar el estado del usuario.");
                            }
                        } catch (err) {
                            console.error(err);
                            showError("No se pudo cambiar el estado del usuario.");
                        }
                    }
                });
            }
        });

        // ✅ Estado inicial
        setMode(false);

        // ============== Mensajes backend (si vienen) ==============
        // Reemplaza tus alert() por el Modal GOV
        const errorMsg = "[[${mensajeError}]]";
        const successMsg = "[[${mensajeExito}]]";

        if (errorMsg && errorMsg !== "null" && errorMsg !== "") {
            showError(errorMsg);
        }

        if (successMsg && successMsg !== "null" && successMsg !== "") {
            showSuccess(successMsg);
        }

        // (Opcional) Soporte si mandas params ?ok=... o ?err=...
        const params = new URLSearchParams(window.location.search);
        const ok = params.get("ok");
        const err = params.get("err");
        if (ok) showSuccess(ok);
        if (err) showError(err);

        // (Opcional) Si quieres confirmación antes de guardar:
        form?.addEventListener("submit", async (ev) => {
    ev.preventDefault(); // 🚫 evitamos submit normal (form-urlencoded)

    try {
        // ===== CSRF (Spring Security) =====
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute("content");
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute("content");

        // ===== Construir JSON desde el form =====
        const payload = {
            idusuario: fId?.value ? Number(fId.value) : null,
            nombre: fNombre?.value?.trim() || "",
            primerapellido: fApp1?.value?.trim() || "",
            segundoapellido: fApp2?.value?.trim() || null,
            email: fEmail?.value?.trim() || "",
            password: (fPass?.value && fPass.value.trim() !== "") ? fPass.value : null,
            idrol: fRol?.value ? Number(fRol.value) : null,
            status: (fStatus?.value === "true")
        };

        // Validación mínima (por si acaso)
        if (!payload.nombre || !payload.primerapellido || !payload.email || !payload.idrol) {
            showError("Completa nombre, primer apellido, correo y rol.");
            return;
        }

        // Endpoint correcto (tu controller está en /admin/usuarios)
        const url = "/admin/usuarios/guardar";

        const headers = { "Content-Type": "application/json" };
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        const res = await fetch(url, {
            method: "POST",
            headers,
            credentials: "same-origin",
            body: JSON.stringify(payload)
        });

        const text = await res.text(); // tu controller devuelve texto
        if (!res.ok) {
            console.error("Guardar usuario error:", text);
            showError(text || "No se pudo guardar el usuario.");
            return;
        }

        showSuccess(text || "Guardado correctamente.");
        setTimeout(() => window.location.reload(), 450);

    } catch (err) {
        console.error(err);
        showError("No se pudo guardar el usuario.");
    }
});
});
</script>

</body>
</html>
