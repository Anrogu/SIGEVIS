<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento SS y Prácticas</title>

    <link rel="stylesheet" href="/css/styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .main-container {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 50px;
        }
        .header-banner {
            background-color: #8b0000; /* Rojo vino oscuro */
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #ffffff;
            border-bottom: 5px solid #8b0000;
        }
        .dashboard-button {
            background-color: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .dashboard-button:hover {
            background-color: #f0f0f0;
            border-color: #8b0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .dashboard-button i {
            font-size: 2.5rem;
            color: #8b0000;
            margin-bottom: 10px;
        }
        .dashboard-button span {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="header-content container-fluid">
    <div class="d-flex align-items-center">
        <img src="/img/Escudo_colibri.png" alt="Escudo de México" style="height: 50px; margin-right: 15px;">
        <img src="/img/Escudo_Estado_Mexico.png" alt="Logo Edo. Méx" style="height: 50px;">
    </div>
    <div class="text-end">
        <h1 class="h3 fw-bold text-dark">ADMINISTRADOR GENERAL</h1>
    </div>
    <nav class="navbar navbar-expand-lg">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link text-danger fw-bold" href="/">INICIO</a>
            <li class="nav-item">
                <form th:action="@{/cerrar-sesion}" method="post" style="display:inline;">
                    <button type="submit" class="nav-link text-danger fw-bold"
                            style="background: none; border: none; padding: 0.5rem 1rem; cursor: pointer;">
                        CERRAR SESIÓN
                    </button>
                </form>
            </li>
        </ul>
    </nav>
</div>
<div class="header-banner"></div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-md-12">
            <div class="main-container">

                <div class="row text-center g-4">

                    <div class="col-md-4 col-sm-6">
                        <a href="/vacantes" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-briefcase"></i>
                                <span>VACANTES</span>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <a href="/asignaciones" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-users-cog"></i>
                                <span>ASIGNACIONES</span>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <a href="/convenios" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-file-contract"></i>
                                <span>CONVENIOS</span>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <a href="/usuarios" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-user-shield"></i>
                                <span>USUARIOS Y ROLES</span>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <a href="/auditorias" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-clipboard-list"></i>
                                <span>AUDITORÍAS</span>
                            </div>
                        </a>
                    </div>

                    <div class="col-md-4 col-sm-6">
                        <a href="/catalogos" class="text-decoration-none">
                            <div class="dashboard-button">
                                <i class="fas fa-book"></i>
                                <span>CATÁLOGOS</span>
                            </div>
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
