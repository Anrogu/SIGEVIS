## CONFIGURACIÓN DE APLICACIÓN
spring.application.name=SsYPp
server.port=8081

## CONFIGURACIÓN DE POSTGRESQL (DataSource)
spring.datasource.url=jdbc:postgresql://localhost:5432/practicasyservicios
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

## CONFIGURACIÓN DE JPA/HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 1. CAMBIO CLAVE: Usaremos 'update' para que, si hay alguna columna nueva, la agregue sin fallar.
# Si quieres seguir en 'validate', la solución 2 y 3 son las importantes.
spring.jpa.hibernate.ddl-auto=validate

# 2. PROPIEDAD CLAVE: Estrategia de nomenclatura física.
# Esto instruye a Hibernate a usar el nombre EXACTO (incluyendo mayúsculas/minúsculas)
# que le diste en @Table(name="Vacantes").
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 3. PROPIEDAD CLAVE: Nomenclatura implícita (solo para asegurarnos)
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

## CONFIGURACIÓN DE FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

## CONFIGURACIÓN DE THYMELEAF
spring.thymeleaf.prefix=classpath:/templates/
# Sección de CONFIGURACIÓN DE JPA/HIBERNATE

# ... (tus otras propiedades) ...

# 4. PROPIEDAD CLAVE FINAL: Fuerza a Hibernate a encerrar nombres de tablas y columnas
# en comillas dobles, resolviendo el problema de Case-Sensitivity de PostgreSQL.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true