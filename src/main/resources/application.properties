## CONFIGURACI?N DE APLICACI?N
spring.application.name=SsYPp
server.port=8081

## CONFIGURACI?N DE POSTGRESQL (DataSource)
spring.datasource.url=jdbc:postgresql://localhost:5432/SIGEVIS
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

## CONFIGURACI?N DE JPA/HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 1. CAMBIO CLAVE: Usaremos 'update' para que, si hay alguna columna nueva, la agregue sin fallar.
# Si quieres seguir en 'validate', la soluci?n 2 y 3 son las importantes.
spring.jpa.hibernate.ddl-auto=validate

# 2. PROPIEDAD CLAVE: Estrategia de nomenclatura fisica.
# Esto instruye a Hibernate a usar el nombre EXACTO (incluyendo may?sculas/min?sculas)
# que le diste en @Table(name="Vacantes").
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 3. PROPIEDAD CLAVE: Nomenclatura impl?cita (solo para asegurarnos)
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

## CONFIGURACI?N DE FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

## CONFIGURACI?N DE THYMELEAF
spring.thymeleaf.prefix=classpath:/templates/
# Secci?n de CONFIGURACI?N DE JPA/HIBERNATE

# ... (tus otras propiedades) ...

# 4. PROPIEDAD CLAVE FINAL: Fuerza a Hibernate a encerrar nombres de tablas y columnas
# en comillas dobles, resolviendo el problema de Case-Sensitivity de PostgreSQL.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jackson.serialization.fail-on-empty-beans=false

